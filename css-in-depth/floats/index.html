通过将内容放置到两个嵌套的容器中，然后给内层的容器设置外边距，让它在外层容器中居中。</p> <p>在本例中，<code>&lt;body&gt;</code> 就是外层容器。因为它默认是 100% 的网页宽度，所以不用给它添加新的样式。在 <code>&lt;body&gt;</code> 内部，整个网页的内容放在了 <code>&lt;div class=&quot;container&quot;&gt;</code>，也就是内层容器中。对于内层容器，需要设置一个 <code>max-width</code>，并将外边距设置为 <code>auto</code>，使内容居中。</p> <h2 id="容器折叠和浮动清除"><a href="#容器折叠和浮动清除" class="header-anchor">#</a> 容器折叠和浮动清除</h2> <p>页面结构为：<code>main</code> 元素 ( 爷爷 ) ，<code>h2</code> 标题 ( 大伯 ) ，匿名 <code>div</code>( 爸爸 ) ，四个 <code>.media</code> 媒体块 ( 孙子 ) 。</p> <ul><li><code>main</code> 元素 ( 爷爷 )
<ul><li><code>h2</code> 标题 ( 大伯 )</li> <li>匿名 <code>div</code> ( 爸爸 )
<ul><li><code>.media</code> 媒体块 ( 孙子 )</li></ul></li></ul></li></ul> <p>浮动的是四个 <code>.media</code> 媒体块 ( 孙子 ) ，外边套一个匿名 <code>div</code> 元素 ( 爸爸 ) ，再外面是 <code>main</code> 元素 ( 爷爷 ) 。四个孙子一浮动，不但脱离了爸爸匿名 <code>div</code> 的管控，连爷爷 <code>main</code> 也一起反了。直接领导爸爸匿名 <code>div</code> 塌陷成零高度。爷爷 <code>main</code> 本来掌管着大伯 <code>h2</code> 和爸爸匿名 <code>div</code>，现在爸爸已经塌成零，爷爷 <code>main</code> 的高度只能靠大伯 <code>h2</code> 来支撑了，所以，<code>main</code> 高度仅仅剩下了 <code>h2</code> 标题的一行。</p> <p>使用浮动进行页面布局，必然会引发外层容器的高度坍塌，但这种行为我们不想要。我们想要的是：四个 <code>.media</code> 孙子浮动出去了，脱离了爸爸匿名 <code>div</code>，也脱离了爷爷 <code>main</code>。爸爸 <code>div</code> 管不了，但是希望爷爷 <code>main</code> 上点手段，可以依然管得住浮动的孙子们。</p> <p><strong>解决外层容器的高度坍塌</strong>
使用跟浮动配套的 <code>clear</code> 属性</p> <h3 id="【方法一】爷爷派出三叔围堵"><a href="#【方法一】爷爷派出三叔围堵" class="header-anchor">#</a> 【方法一】爷爷派出三叔围堵</h3> <p>此时的网页结构，爷爷 <code>main</code> 下面三个儿子：大伯 <code>h2</code>，爸爸匿名 <code>div</code>，加上新增的三叔 <code>&lt;div style=&quot;clear: both&quot;&gt;&lt;/div&gt;</code>。爷爷果然有手段，凭空生出个三叔，再让三叔略施手段，爷爷的实力范围即刻扩展。这样在浮动孙子的前面有大伯 <code>h2</code>、后面有三叔 <code>div</code>，爷爷高度便给撑起来了，往下可以一直去到三叔的位置。</p> <h3 id="【方法二】爷爷派出小叔围堵"><a href="#【方法二】爷爷派出小叔围堵" class="header-anchor">#</a> 【方法二】爷爷派出小叔围堵</h3> <p>首先，澄清一种元素关系：伪元素跟宿主元素的关系到底是兄弟关系亦或是父子关系？MDN 文档关于伪元素的解释是：</p> <blockquote><p>CSS 中，<code>::before</code> 创建一个伪元素，其将成为匹配选中的元素的第一个子元素。
CSS 伪元素 <code>::after</code> 用来创建一个伪元素，作为已选中元素的最后一个子元素。</p></blockquote> <p>那么根据官方文档，伪元素是宿主元素的子元素，也就是说 <code>::before</code> 是大儿子，<code>::after</code> 是小儿子。后面所讨论的元素之间的各种层级关系 ( 辈分关系 ) 均是基于这个前提。</p> <div class="language-CSS line-numbers-mode"><pre class="language-css"><code><span class="token selector">.clearfix::after</span> <span class="token punctuation">{</span>
  <span class="token property">display</span><span class="token punctuation">:</span> block<span class="token punctuation">;</span>
  <span class="token property">content</span><span class="token punctuation">:</span> <span class="token string">&quot; &quot;</span><span class="token punctuation">;</span>
  <span class="token property">clear</span><span class="token punctuation">:</span> both<span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>在本例中，<code>.clearfix</code> 类标签是贴在爷爷 <code>main</code> 身上的，那么 <code>.clearfix::after</code> 逻辑上选中的就是爷爷 <code>main</code> 的小儿子、浮动孙子 <code>.media</code> 的小叔叔 <code>main::after</code>。</p> <ul><li>方法一，爷爷明面上派出一个三叔空白 <code>div</code></li> <li>方法二，只需爷爷暗地派出自己的小儿子、浮动孙子的小叔叔 <code>main::after</code> 即可。</li> <li><code>::after</code> 的真实辈分关系，要看其前缀 <code>.clearfix</code> 的类标签是贴在谁的身上，贴谁那谁就是伪元素 <code>::after</code> 的宿主元素 ( 父亲大人 ) 。</li></ul> <p>接下来，我们来讨论一下原文中关于【方法二】清除浮动的施用对象，此部分内容疑似有误。以下分别是中英文原文摘录。</p> <blockquote><p>请注意，要给包含浮动的元素清除浮动，而不是给别的元素，比如浮动元素本身，或包含浮动的元素后面的兄弟元素。
It’s important to know that the clearfix is applied to the element that contains the floats; a common mistake is to apply it to the wrong element, such as the floats or the container after the one that contains them.</p></blockquote> <p>先把原文掰开了讲：</p> <ul><li>清除浮动，要施加在「包含浮动的元素」 ( 爷爷或爸爸 )</li> <li>清除浮动，不能施加在「浮动元素本身」</li> <li>清除浮动，不能施加在「包含浮动的元素后面的兄弟元素」 ( 叔叔 )</li></ul> <p>再来一个个勘误：
上面已经说过了，【方法二】的页面结构：浮动元素是四个媒体块 <code>.media</code>( 孙子 ) ，外边套一个匿名 <code>div</code> 元素 ( 爸爸 ) ，再外面是 <code>main</code> 元素 ( 爷爷 ) 。<code>.clearfix</code> 类标签确实是贴在爷爷 <code>main</code> ( 包含浮动的元素 ) 身上的，但是 <code>.clearfix::after</code> 选中的却是伪元素 <code>main::after</code>，即清除浮动是施加在小叔叔「包含浮动的元素后面的兄弟元素」的身上。由此可见，清除浮动不但可以施加在「包含浮动的元素后面的兄弟元素」 ( 叔叔元素 ) 身上，而且页面采用爷爷、爸爸、浮动孙子三层结构、清除浮动施加在小叔叔 <code>main::after</code> 身上，是最佳实践。</p> <p>那么清除浮动是否可以施加在「浮动元素本身」上面呢？后文 4.3 小节中的 <code>.media:nth-child(odd) {clear: left}</code> 便是直接把清除浮动施加在了「浮动元素本身」。</p> <h3 id="【方法三】爷爷派出大伯和小叔"><a href="#【方法三】爷爷派出大伯和小叔" class="header-anchor">#</a> 【方法三】爷爷派出大伯和小叔</h3> <p>使用浮动布局时，为什么说三层嵌套是最佳实践？因为可以「防止外边距折叠」。
<code>.clearfix</code> 类标签贴在爷爷 <code>main</code> 身上，通过引进 <code>.clearfix::before</code> 和 <code>.clear::after</code>，可将原来的大伯 <code>h2</code> 的外边距限制在爷爷内部。
<code>.clearfix</code> 类标签贴在爸爸 <code>div</code> 身上，则无法限制将大伯 <code>h2</code> 的外边距限制在爷爷内部。</p> <div class="language-CSS line-numbers-mode"><pre class="language-css"><code><span class="token selector">.clearfix::before,
.clearfix::after</span> <span class="token punctuation">{</span>
 <span class="token property">display</span><span class="token punctuation">:</span> table<span class="token punctuation">;</span>
 <span class="token property">content</span><span class="token punctuation">:</span> <span class="token string">&quot; &quot;</span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>
<span class="token selector">.clearfix::after</span> <span class="token punctuation">{</span>
 <span class="token property">clear</span><span class="token punctuation">:</span> both<span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br></div></div><h2 id="出乎意料的「浮动陷阱」"><a href="#出乎意料的「浮动陷阱」" class="header-anchor">#</a> 出乎意料的「浮动陷阱」</h2> <p>浏览器会将浮动元素尽可能地放在靠上的位置。</p> <p>解决方案：奇数项浮动元素清除浮动。</p> <div class="language-CSS line-numbers-mode"><pre class="language-css"><code><span class="token selector">.media:nth-child(odd)</span> <span class="token punctuation">{</span>
 <span class="token property">clear</span><span class="token punctuation">:</span> left<span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h2 id="媒体对象和-bfc"><a href="#媒体对象和-bfc" class="header-anchor">#</a> 媒体对象和 BFC</h2> <p>布局目标：媒体对象模式 = 左边图片 + 右边文字</p> <p>HTML 代码结构</p> <div class="language-HTML line-numbers-mode"><pre class="language-html"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">class</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>media<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>img</span> <span class="token attr-name">src</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>001.jpg<span class="token punctuation">&quot;</span></span> <span class="token attr-name">alt</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span><span class="token punctuation">&quot;</span></span> <span class="token attr-name">class</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>media-image<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>div</span> <span class="token attr-name">class</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>media-body<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>h4</span><span class="token punctuation">&gt;</span></span>1 Strength<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>h4</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>p</span><span class="token punctuation">&gt;</span></span>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Ut sapiente voluptate velit illo enim, vel Lorem ipsum dolor sit, amet consectetur adipisicing elit. Ut sapiente voluptate velit illo enim
      numquam quos quis libero autem, sapiente voluptate velit illo enim,cumque atque dolores rerum iure! sapiente voluptate velit illo enim,<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>p</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>div</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br></div></div><p>第一步，让图片浮动，后面的文字脱离文档流，对图片呈环绕包围状态。</p> <div class="language-CSS line-numbers-mode"><pre class="language-css"><code><span class="token selector">.media-image</span> <span class="token punctuation">{</span>
  <span class="token property">float</span><span class="token punctuation">:</span> left<span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>第二步，给文字部分创建 BFC，取消文字的环绕效果，形成媒体对象模式 ( 左图片右文字 ) 。</p> <div class="language-CSS line-numbers-mode"><pre class="language-css"><code><span class="token selector">.media-body</span> <span class="token punctuation">{</span>

="line-number">51</span><br><span class="line-number">52</span><br><span class="line-number">53</span><br><span class="line-number">54</span><br><span class="line-number">55</span><br><span class="line-number">56</span><br><span class="line-number">57</span><br><span class="line-number">58</span><br><span class="line-number">59</span><br><span class="line-number">60</span><br><span class="line-number">61</span><br><span class="line-number">62</span><br><span class="line-number">63</span><br><span class="line-number">64</span><br><span class="line-number">65</span><br><span class="line-number">66</span><br><span class="line-number">67</span><br><span class="line-number">68</span><br><span class="line-number">69</span><br><span class="line-number">70</span><br><span class="line-number">71</span><br><span class="line-number">72</span><br><span class="line-number">73</span><br><span class="line-number">74</span><br><span class="line-number">75</span><br></div></div><p>使用浮动实现的布局仍有小缺陷：第二个 media 灰色块因为文字内容少、缺乏支撑，高度明显偏低了。不符合「自适应式」的大义。请大胆抛弃浮动，拥抱 Flexbox 和 Grid 布局吧。</p> <h2 id="网络系统"><a href="#网络系统" class="header-anchor">#</a> 网络系统</h2> <p>不足：每一行内的两个 <code>cloumn-6</code> 元素，不是等高列，每个元素的高度均由各自的内容撑开，可能一高一低。</p> <h2 id="总结"><a href="#总结" class="header-anchor">#</a> 总结</h2> <p>❑ 浮动的设计初衷是让文字围绕一个元素排列，但有时这种效果并不是我们想要的
❑ 使用清除浮动来包含浮动元素
❑ BFC 有 3 个好处：包含浮动元素，防止外边距折叠，防止文档流围绕浮动元素排列
