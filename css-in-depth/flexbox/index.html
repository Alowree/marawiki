 class="beLink" data-v-06225672>Alowree</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2023-05-20</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">文章目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABGpJREFUSA3tVVtoXFUU3fvOI53UlmCaKIFmwEhsE7QK0ipFEdHEKpXaZGrp15SINsXUWvBDpBgQRKi0+KKoFeJHfZA+ED9KKoIU2gYD9UejTW4rVIzm0VSTziPzuNu1z507dibTTjL4U/DAzLn3nL3X2o91ziX6f9wMFdh6Jvbm9nNSV0msViVO6tN1Rm7NMu2OpeJ9lWBUTDxrJbYTS0hInuwciu9eLHlFxCLCZEk3MegsJmZ5K/JD6t7FkFdEvGUo1g7qJoG3MHImqRIn8/nzY1K9UPKKiJmtnUqHVE3Gbuay6vJE/N2FEmuxFjW2nUuE0yQXRRxLiTUAzs36zhZvOXJPdX850EVnnLZkB8prodQoM5JGj7Xk2mvC7JB8tG04Ef5PiXtG0UtxupRQSfTnBoCy554x18yJHI6I+G5Eru4LHmPJZEQsrvPUbMiA8G/WgMK7w7I+ez7++o2ANfbrjvaOl1tFMs+htG3IrZH9/hDX1Pr8Tc0UvH8tcX29KzAgIGcEkINyW5BF9x891hw6VYqgJHEk0huccS7vh3C6gTiODL+26huuBtbct8eZnqLML8PkxGYpuPZBqtqwkSjgc4mB5gbgig5i+y0UDK35LMxXisn9xQtK+nd26gTIHsHe/oblK/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">Flexbox<!----></h1> <!----> <div class="theme-vdoing-content content__default"><div class="custom-block theorem"><p class="title">本章概要</p><p>❑ 弹性容器和弹性元素<br>
❑ 主轴和副轴<br>
❑ Flexbox 里的元素大小<br>
❑ Flexbox 里的元素对齐</p></div> <p></p><div class="table-of-contents"><ul><li><a href="#flexbox-的原则">Flexbox 的原则</a></li><li><a href="#弹性子元素的大小">弹性子元素的大小</a></li><li><a href="#弹性方向">弹性方向</a></li><li><a href="#对齐、间距等细节">对齐、间距等细节</a></li><li><a href="#值得注意的地方">值得注意的地方</a></li><li><a href="#总结">总结</a></li></ul></div><p></p> <h2 id="flexbox-的原则"><a href="#flexbox-的原则" class="header-anchor">#</a> Flexbox 的原则</h2> <ul><li>给元素添加 <code>display: flex</code>，该元素变成了一个弹性容器（flex container） ，它的直接子元素变成了弹性子元素（flex item）</li> <li>弹性子元素默认是在同一行按照从左到右的顺序并排排列</li> <li>弹性容器像块元素一样填满可用宽度，但是弹性子元素不一定填满其弹性容器的宽度</li> <li>弹性子元素高度相等，该高度由它们的内容决定</li></ul> <p>在本例中，弹性容器应该是无序列表 <code>&lt;ul&gt;</code>。它的子元素，即列表项 <code>&lt;li&gt;</code> 就是弹性子元素。</p> <p>弹性盒子内的 <code>auto</code> 外边距会填充所有可用空间。</p> <h2 id="弹性子元素的大小"><a href="#弹性子元素的大小" class="header-anchor">#</a> 弹性子元素的大小</h2> <p>前面的代码使用外边距给弹性子元素设置了间距。你可以用 <code>width</code> 和 <code>height</code> 属性设置它们大小，但是比起 <code>margin</code>、<code>width</code>、<code>height</code> 这些常见属性，Flexbox 提供了更多更强大的选项。</p> <p><code>flex</code> 属性控制弹性子元素在主轴方向上的大小（在这里指的元素的宽度）。代码清单 5-6 将给网页的主区域应用弹性布局，并使用 <code>flex</code> 属性控制每一列的大小。</p> <p><code>flex</code> 属性是三个不同大小属性的简写：<code>flex-grow</code>、<code>flex-shrink</code> 和 <code>flex-basis</code>。在代码清单 5-7 里，只提供了 <code>flex-grow</code> 的值，剩下的两个属性是默认值（分别是 1 和 0%），因此 <code>flex: 2</code> 等价于 <code>flex: 2 1 0%</code>。通常首选简写属性，但也可以分别声明三个属性。</p> <p>与大部分简写属性不一样，如果在 <code>flex</code> 中忽略某个子属性，那么子属性的值并不会被置为初始值。相反，如果某个子属性被省略，那么 <code>flex</code> 简写属性会给出有用的默认值：<code>flex-grow</code> 为 1、<code>flex-shrink</code> 为 1、<code>flex-basis</code> 为 0%。这些默认值正是大多数情况下所需要的值。</p> <p>每个子元素的 <code>flex-shrink</code> 值代表了它是否应该收缩以防止溢出。如果某个子元素为 <code>flex-shrink: 0</code>，则不会收缩；如果值大于 0，则会收缩至不再溢出。按照 <code>flex-shrink</code> 值的比例，值越大的元素收缩得越多。</p> <h2 id="弹性方向"><a href="#弹性方向" class="header-anchor">#</a> 弹性方向</h2> <h2 id="对齐、间距等细节"><a href="#对齐、间距等细节" class="header-anchor">#</a> 对齐、间距等细节</h2> <h2 id="值得注意的地方"><a href="#值得注意的地方" class="header-anchor">#</a> 值得注意的地方</h2> <h2 id="总结"><a href="#总结" class="header-anchor">#</a> 总结</h2> <ol><li>全局重置盒尺寸</li> <li>全局外边距，通过猫头鹰选择器，只给容器内从第二个开始往后的子元素添加 <code>margin-top</code>，即容器内第一个子元素不设置 <code>margin-top</code>。这样设置之后，外边距只存在于上下排列的 <strong>子元素之间</strong></li> <li>双容器，用于网页内容居中。外层容器是 <code>body</code>，内层窗口是 <code>.container</code>，并将外边距 <code>margin</code> 设置为 <code>auto</code></li> <li>更棒的是，Flexbox 允许使用 <code>margin: auto</code> 来填充弹性子元素之间的可用空间。弹性盒子内的 <code>auto</code> 外边距会填充所有可用空间</li></ol></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=CSS" title="标签">#CSS</a><a href="/tags/?tag=Flexbox" title="标签">#Flexbox</a></div> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/css-in-depth/floats/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">理解浮动</div></a> <a href="/css-in-depth/grid-layout/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">网格布局</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
