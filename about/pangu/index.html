括号全部修正为半角圆括号、并前后添加空格的做法，个人也不太认同，选择注释关闭、暂未启用。目前插件的修改版仍然保留了“中文使用全角括号、英文中使用半角括号”的常规做法。</p> <p>在参考了插件修改入门教程之后，直接修改插件 <code>pangu-markdown</code> 的主文件 <code>extension.js</code> 内的相关代码。而主文件 <code>extension.js</code> 保存在 <code>C:\Users\用户名\.vscode\extensions\xlthu.pangu-markdown-0.0.6</code> 文件夹下。</p> <p>在插件 <code>pangu-markdown</code> 的基础代码之上，嫁接部分来自 <code>pangu-markdown-vscode</code> 的部分代码，希望可以定制自己所需的“盘古之白”。所添加和修改的全部代码，仅涉及一个知识点：JavaScript 程序下的正则匹配和替换。修改后的代码附在本文后面。</p> <p>本文内容用作 VS Code 右键菜单 <code>Pangu Format</code> 的效果查验，查验完成之后，通过 <kbd>Ctrl + z</kbd> 又立即恢复原样，以期下一次的查验。</p> <h2 id="中文和英文、数字之间"><a href="#中文和英文、数字之间" class="header-anchor">#</a> 中文和英文、数字之间</h2> <p>原文：中文English</p> <p>修正：中文 English</p> <p>原文：中文123</p> <p>修正：中文 123</p> <p>原文：English中文</p> <p>修正：English 中文</p> <p>原文：123中文</p> <p>修正：123 中文</p> <p>原文：中文内容里面掺杂英文半角的(括号)应该转换成全角（括号）。</p> <p>修正：中文内容里面掺杂英文半角的（括号）应该转换成全角（括号）。</p> <p>像下面这样，中文行文使用全角括号，当然没有问题；当括号里面的内容为英文时，仍然保留全角括号不变。</p> <ul><li><code>\d</code>：等价于 <code>[0-9]</code>，其中的 d 代表“数字（digit）”</li> <li><code>\w</code>：等价于 <code>[0-9a-zA-Z_]</code>，其中的 w 代表“单词字符（word）”</li> <li><code>\s</code>：等价于 <code>[ \t\r\n\v\f]</code>（方括号内的第一个字符是空格），s 表示“空白字符（space）”</li></ul> <h2 id="中文和行内样式之间"><a href="#中文和行内样式之间" class="header-anchor">#</a> 中文和行内样式之间</h2> <p>原文：中文文字和<code>行内代码</code>之间</p> <p>修正：中文文字和 <code>行内代码</code> 之间</p> <p>原文：</p> <p><code>document.documentElement</code>获取文档对象的根元素，即<code>&lt;html&gt;</code>元素<br>
给<code>html</code>元素的<code>.style</code>样式添加<code>filter</code>滤镜样式为<code>invert(85%) hue-rotate(180deg)</code><br> <code>invert()</code>反转图像。<br> <code>hue-rotate()</code>色相旋转。</p> <p>修正：</p> <p><code>document.documentElement</code> 获取文档对象的根元素，即 <code>&lt;html&gt;</code> 元素<br>
