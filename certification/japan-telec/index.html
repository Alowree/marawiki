ass="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">文章目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">日本 TELEC<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>日本无线认证分得比较细，但总的来说，都可以称之为：giteki 认证 ( 日本对技术合格证的称呼 )</p> <p>日本总务省 MIC ( Ministry of Internal Affairs and Communications ) 颁布的《电波法》和《电气通信事业法》进行的认证——技术基准适合证明和技术基准适合认定，因为这两类认证都包含「技适」一词，所以统称为 giteki 认证。</p> <h2 id="认证名称的区别"><a href="#认证名称的区别" class="header-anchor">#</a> 认证名称的区别</h2> <p>TELEC ( Telecom Engineering Center ) ，电信工程中心，是首家进行《电波法》认证的合法机构。</p> <p>JATE ( Japan Approvals Institute for Telecommunications Equipment ) ，日本电信设备审查协会，是首家进行《电气通信事业法》认证的合法机构。</p> <p>而 MIC 是两个法的认证监管部门，所以也有叫 giteki 认证为 TELEC/JATE/MIC 认证等非正规的说法。可以接人电信公共网络且有无线发射功能设备需要符合 giteki 认证要求。</p> <h2 id="日本无线认证的形式"><a href="#日本无线认证的形式" class="header-anchor">#</a> 日本无线认证的形式</h2> <p>技术基准适合证明，实际上就是俗称的日本《电波法》认证。技术基准适合认定，就是俗称的日本《电气通信事业法》认证。该认证包含三类：技术基准适合证明 ( 或认定 ) 、工事设计认证、技术基准适合自我确认。</p> <p>技术基准适合证明 ( 或认定 ) ：表示在日本销售的每一台设备都要进行实验室的测试，以标明该产品符合《电波法》 ( 或《电气通信事业法》 ) 的要求。认证通过后，每一台送检的设备都在商品标签上加贴 giteki 的标识，每一台设备都有唯一编号。 ( 适用无线通信类产品 )</p> <p>工事设计认证相当于通常说的型式认证。也就是说，如果你生产一个型号的产品，只要拿几台设备到实验室检测，认证通过后，该型号的每一台设备都可以在商品标签上加贴 giteki 的标识以及相同的电波认证编号。 ( 适用无线产品 )</p> <p>技术基准适合自我确认：仅适用于《电波法》认证分类中被划分为「特定无线设备」的产品，对应于日本《电波法》第 38 条第 33 款第 1 项；适用于《电气通信事业法》认证分类中被划分为「特定终端设备」的产品。</p> <h2 id="telec-认证"><a href="#telec-认证" class="header-anchor">#</a> TELEC 认证</h2> <p>包括：测试认证 ( Test Certification ) 和型式认证 ( Type Certification ) 。</p> <p><strong>测试认证</strong> 是针对每一个设备单元进行验证，该认证只对每一个经过了验证的设备单元有效；适用无线通信类产品。</p> <p><strong>型式认证</strong> 是指对同样设计和制造的一批设备的样品进行验证，该认证对该批设备都有效，但如果设备的设计或制造发生了改变，设备将需要重新认证；适用无线产品。</p> <ul><li>工厂检查：无，要提供 ISO 证书</li> <li>证书有效期：永久有效</li> <li>证书持有者：申请者</li> <li>代理商需求：有</li> <li>认证周期：2-3 周</li> <li>认证费用：USD2,658</li></ul> <p>目前，由 MIC 认可的指定无线电设备注册认证机构，如下所示 ：</p> <ol><li>TELEC</li> <li>JARD</li> <li>DSP Research, Inc.</li> <li>Phoenix</li> <li>TüV Rheinland Japan Ltd.</li> <li>RF Technologies</li> <li>UL Apex Co., Ltd.</li> <li>COSMOS CORPORATION</li> <li>Chemitox, Inc.</li></ol> <h2 id="无线通信设备-telec-认证需要提交的资料"><a href="#无线通信设备-telec-认证需要提交的资料" class="header-anchor">#</a> 无线通信设备 TELEC 认证需要提交的资料</h2> <p>( 1 ) 技术型号规格表 ( Technical Type Specification Form ) ；</p> <p>( 2 ) 质量申明管理系统 ( Declaration of Quality Management System ) ；</p> <p>( 3 ) 质量证书的控制批准方法或者 ISO9001 证书 ( Letter of Quality Control Confirmation MethodorManufacturer』s ISO 9001 Certificate ) ；</p> <p>( 4 ) 结构保护批准证书 ( Letter of Construction Protection Confirmation ) ；</p> <p>( 5 ) 宣称的额定功率 ( Rated Power Declaration ) ；</p> <p>( 6 ) 天线报告 ( Antenna Report ) ；</p> <p>( 7 ) 测试报告 ( Test Reports ( including Test Results,Test Setup Photos and Examinations carried out ) ；</p> <p>( 8 ) Block Diagram, Schematic Diagram, Bill of Material, Parts Placement, IC Data Sheets, Internal and External, Photos,Product Description,User manual,Operational/Technical Description, Description of Pheripherals/Accessories ) ；</p> <p>( 9 ) 标签信息 ( Label Information ( Label Location, Label content )) ; If you act as agent or as authorized representative of the manufacturer.</p> <p>( 10 ) 委托书/授权书 ( Power of Attorney/Authorization Letter ) ；</p> <p>说明：所有递交的文档建议为日文文档，英文文档也可被接受。测试报告可以用当地测试机构所用语言。</p> <h2 id="wlan、bluetooth-产品的-telec-认证"><a href="#wlan、bluetooth-产品的-telec-认证" class="header-anchor">#</a> WLAN、Bluetooth 产品的 TELEC 认证</h2> <p>TELEC 是日本针对无线产品的强制性认证，有些类似于国内的 SRRC。其遵循的是日本的电波法。具体的测试规范则是遵循 MIC ( 日本总务省 ) Notice No.88 法规。</p> <p>WiFi 和 Bluetooth 产品其的测试项目基本上与欧标和美标的测试方法不同。</p> <p>其中 2.4GHz WiFi 产品 ( 802.11b/g, 2412-2472 MHz ) 和 Bluetooth 产品使用的标准为 MIC Notice No.88 Annex43，但是对于 2.4GHz WiFi 产品的 14 信道 ( Channel 14:2471-2497MHz ) 则需要单独使用 Annex44 进行测试和出具报告，相应的规费也需要增加。</p> <p>对于 5GHz WiFi 产品 ( 802.11a, 5180~5320MHz, W52 Band 和 W53 Band ) 遵循的测试标准为 Annex45，但是需要注意的是，资料显示，MIC 近期将会修改 Annex45，将 5.6GHz 设备 ( Band W56 ) 也归入 Annex45，并且对 Band 56 频段有更加严格的 DFS 测试要求。</p> <p>https://zhuanlan.zhihu.com/p/424355099
https://www.telec.or.jp/eng/services/tech/</p></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=TELEC" title="标签">#TELEC</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2023/07/08, 21:17:59</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><!----> <a href="/certification/thailand-nbtc/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">泰国 NBTC</div></a></div> <div class="page-nav"><p class="inner"><!----> <span class="next"><a href="/certification/thailand-nbtc/">泰国 NBTC</a>→
