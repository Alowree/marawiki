Vl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">澳洲 RCM<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>RCM 认证与 SAA 和 C-Tick 认证都是澳洲的认证，那这三种认证之间有什么区别，下面我们就一起来看看吧！</p> <h2 id="三种认证-rcm、saa-和-c-tick"><a href="#三种认证-rcm、saa-和-c-tick" class="header-anchor">#</a> 三种认证 RCM、SAA 和 C-Tick</h2> <ol><li>澳洲 RCM 认证</li></ol> <p>RCM (Regulatory Compliance Mark) 是一种注册标志，表明供方声明产品符合澳大利亚各州以及新西兰的电气安全法律/法规规定的安全及其他要求，同时也符合澳大利亚《无线电通信法》和新西兰《无线电通信法》规定的电磁兼容要求。只有产品同时符合电气安全法规和 EMC 法规的要求才能使用 RCM 标志 。</p> <p>适用的国家有：澳大利亚瑙鲁、斐济、所罗门群岛、基里巴斯、密克罗尼西亚联邦、图瓦卢、新西兰、汤加、马绍尔群岛、瓦努、巴布亚新几内亚、萨摩亚。</p> <ol start="2"><li>澳洲 SAA 认证</li></ol> <p>SAA 认证为澳大利亚的标准机构为 Standards Association of Australian 旗下认证，所以很多朋友称为澳大利亚认证。进入澳大利亚市场的电器产品必须符合 SAA 认证。SAA 的标志主要有两种，一种是形式认可，一种是标准标志。形式认证是只能样品负责，而标准标志是需每个进行工厂审查的。SAA 的认证范围主要分为质量管理体系；环境管理体系；职业健康与安全管理；信息安全管理；常见产品申请澳大利亚 SAA 认证的周期是 3-4 周，如果产品质量不达标，可能日期会有所延长。如果运送的产品未获认证，将会扣留或没收产品或罚款。</p> <ol start="3"><li>澳洲 C-TICK 认证</li></ol> <p>C-Tick 认证为澳洲 EMC 认证项目，实验室提供 C-Tick 测试报告，澳洲进口商再用 C-Tick 测试报告进行注册。C-Tick 是由澳大利亚通信和媒体管理局 (Australian Communications and Media Authority, 简称 ACMA) 为了通信设备发的认证标志。澳大利亚的 EMC 体系把产品划分为三个级别，供应商在销售级别二、级别三产品前，必须在 ACMA 注册，申请使用 C-Tick 标志。</p> <h2 id="rcm、saa-和-c-tick-三者的区别"><a href="#rcm、saa-和-c-tick-三者的区别" class="header-anchor">#</a> RCM、SAA 和 C-Tick 三者的区别</h2> <ol><li><p>SAA 是进入澳大利亚市场的产品要做的<strong>安全认证</strong></p></li> <li><p>C-Tick 目的是保护<strong>无线电</strong>通讯频段的资源，它规定的实施制度有点类似于欧洲的 EMC 指令</p></li> <li><p>RCM 标志目的是把<strong>安规</strong>和<strong>电磁兼容</strong>组合认证
原来澳大利亚的安规 SAA 和 C-TICK 是分开认证的，SAA 的申请可以是不同国家的工厂和贸易商，而 C-TICK 的备案主体是澳大利亚的合法注册公司。所以，在 RCM 的申请过程中就需要有澳大利亚的法人主体，也就是 RCM 是需要澳大利亚公司为担保的一种认证模式。对于大部分产品来说，都需要取得 SAA 证书和 EMC 测试报告，才可以注册成 RCM 证书。</p></li> <li><p>SAA 认证和 C-Tick 认证正在逐步取消，代之以 RCM 认证，该认证涵盖<strong>安规</strong>和<strong>电磁兼容</strong></p></li> <li><p>RCM 的认证费用大约在1500美元</p></li></ol> <blockquote><p>The RCM replaces the A-Tick and C-Tick compliance marks. You can keep supplying products that you labelled with the A-Tick or C-Tick before 1 March 2016, until the stock runs out.</p></blockquote> <h2 id="参考资料"><a href="#参考资料" class="header-anchor">#</a> 参考资料</h2> <p><a href="https://www.acma.gov.au/follow-our-rules-supply-your-product" target="_blank" rel="noopener noreferrer">Follow our rules to supply your product<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=RCM" title="标签">#RCM</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2023/06/30, 08:13:42</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/certification/thailand-nbtc/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">泰国 NBTC</div></a> <a href="/certification/power-adaptor/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">电源适配器 - 各国的安规和认证要求</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
