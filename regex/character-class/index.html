ode> 等。</p> <p><code>[0123456789]</code> 是以字符串形式给出的正则表达式，它是一个 <strong>字符组</strong>，表示“这里可以是 0、1、2、…、8、9 中的任意一个字符”。普通字符组 <code>[…]</code> 仅 <strong>匹配单一字符</strong>。</p> <p>字符组中的字符排列顺序 <strong>并不影响</strong> 字符组的功能，出现重复字符也不会影响，所以 <code>[0123456789]</code> 完全等价于 <code>[9876543210]</code>、<code>[1029384756]</code>、<code>[9988876543210]</code>。</p> <p>不过，代码总是要容易编写、方便阅读，正则表达式也是一样的，所以一般并不推荐在字符组中出现重复字符。而且，还应该让字符组中的字符排列更符合认知习惯，比如 <code>[0123456789]</code> 就好过 <code>[0192837465]</code>。</p> <p>正则表达式提供了使用 <code>-</code> 表示的 <strong>范围表示法</strong>，它更直观，能进一步简化字符组。所谓“范围表示法”，就是用 <code>[x-y]</code> 的形式表示从 <code>x</code> 到 <code>y</code> 整个范围内的字符。例如：</p> <ul><li><code>[0123456789]</code> 可以表示为 <code>[0-9]</code></li> <li><code>[abcdefghighklmnopqrstuvwxyz]</code> 可以表示为 <code>[a-z]</code></li></ul> <p>在字符组中，<code>-</code> 表示的范围，一般是根据字符对应的 <strong>码值</strong> 来确定的，码值小的字符在前，码值大的字符在后。码值，Code Point，也就是字符在对应 ASCII 编码表中的编码的数值。</p> <p>在字符组中可以同时并列多个“范围表示法”：</p> <ul><li>字符组 <code>[0-9a-zA-Z]</code> 可以匹配数字、大写字母或小写字母中的任意一个</li> <li>字符组 <code>[0-9a-fA-F]</code> 可以匹配数字，大、小写形式的 a~f，它可以用来验证十六进制字符中的任意一个</li></ul> <h2 id="元字符与转义"><a href="#元字符与转义" class="header-anchor">#</a> 元字符与转义</h2> <p><strong>元字符</strong>，Meta Character</p> <p><code>[</code>、<code>]</code>、<code>^</code>、<code>$</code>、<code>-</code></p> <ul><li>字符组中的 <code>-</code>，如果它紧邻着字符组中的开方括号 <code>[</code>，那么它就是普通字符，其他情况下都是元字符</li> <li>对于其他元字符，取消特殊含义的做法都是转义，也就就是在正则表达式中的元字符前加上反斜线字符 <code>\</code></li></ul> <p>如果要在字符组内部使用横线 <code>-</code>，最好的办法是将它排列在字符组的开头：</p> <ul><li><code>[-09]</code> 匹配 3 个字符 <code>-</code>、<code>0</code>、<code>9</code> 中的任意一个</li> <li><code>[0-9]</code> 匹配 0~9 这 10 个数字中的任意一个</li> <li><code>[-0-9]</code> 匹配 <code>-</code> 和 0~9 这 11 个字符中的任意一个</li></ul> <p><strong>转义</strong>，Escape Sequence</p> <p>正则表达式 <code>[0\-9]</code> 包含 6 个字符：<code>[</code>、<code>0</code>、<code>\</code>、<code>-</code>、<code>9</code>、<code>]</code>，在表达式中只需要使用这 6 个字符即可，但是在源代码里，必须使用 7 个字符：<code>\</code> 需要转义成 <code>\\</code>，因为处理字符串时，反斜线和它之后的字符会被认为是转义序列，比如 <code>\n</code>、<code>\t</code> 都是合法的转义序列，然而 <code>\-</code> 不是。</p> <p>换句话说，正则表达式 <code>[0\-9]</code> 可以匹配 <code>0</code>、<code>\</code>、<code>-</code>、<code>9</code> 这 4 个字符的任意一个；在 Python 源代码中，必须写成 <code>[0\\-9]</code> 才可以匹配 <code>0</code>、<code>\</code>、<code>-</code>、<code>9</code> 这 4 个字符的任意一个。</p> <p>这确实有点麻烦，但需要注意。</p> <p>不过，Python 提供了 <strong>原生字符串</strong>，Raw String，它的形式是 <code>r&quot;string&quot;</code>，也就是在普通字符串之前添加 <code>r</code>。原生字符串内的 <strong>双引号必须转义</strong> 写成 <code>\&quot;</code>，其他的字符则完全不需要考虑转义。</p> <p>继续看转义，如果希望在字符组中列出闭方括号 <code>]</code>，比如 <code>[012]345]</code>，就必须在它之前使用反斜线转义，写成 <code>[012\]345]</code>；否则，正则表达式将 <code>]</code> 与最近的 <code>[</code> 匹配，这个表达式就成了“字符组 <code>[012]</code> 加上 4 个字符 <code>345]</code>”，它能匹配的是字符串 <code>0345]</code>、<code>1345]</code>、<code>2345]</code>，却不能匹配 <code>]</code>。</p> <ul><li><code>[012]345]</code>：匹配 <code>0345]</code>、<code>1345]</code>、<code>2345]</code> 共 3 个选项中的任意一项</li> <li><code>[012\]345]</code>：匹配 <code>0</code>、<code>1</code>、<code>2</code>、<code>]</code>、<code>3</code>、<code>4</code>、<code>5</code> 共 7 个选项中的任意一项</li></ul> <p>除去字符组内部的 <code>-</code>，其他元字符的转义都必须在字符之前添加反斜线，<code>[</code> 的转义也是如此。如果只希望匹配字符串 <code>[012]</code>，直接使用正则表达式 <code>[012]</code> 是不行的，因为这会被识别为一个字符组，它只能匹配 <code>0</code>、<code>1</code>、<code>2</code> 这三个字符中的任意一个；所以必须转义，把正则表达式写作 <code>\[012]</code>，请注意，只有开方括号 <code>[</code> 需要转义，闭方括号 <code>]</code> 不需要转义。</p> <h2 id="排除型字符组"><a href="#排除型字符组" class="header-anchor">#</a> 排除型字符组</h2> <p><strong>排除型字符组</strong>，Negated Character Class</p> <p>是在开方括号 <code>[</code> 之后紧跟一个 <strong>脱字符</strong> <code>^</code>，写作 <code>[^…]</code>，表示“在当前位置，匹配一个没有列出的字符”。所以 <code>[^0-9]</code> 就表示“0~9 之外的字符”，也就是“非数字字符”。</p> <p><strong>排除型字符组必须匹配一个字符。</strong></p> <p>在排除型字符组中，紧跟在 <code>^</code> 之后的 <code>-</code> 不是元字符。在其他位置的 <code>-</code> 是元字符，表示范围。</p> <p>在排除型字符组中，<code>^</code> 是一个元字符，但只有它紧跟在 <code>[</code> 之后才是元字符。如果想表示“这个字符组中可以出现 <code>^</code> 字符”，不要让它紧挨着 <code>[</code> 即可，否则就要转义。</p> <h2 id="字符组简记法"><a href="#字符组简记法" class="header-anchor">#</a> 字符组简记法</h2> <p>常见的字符组简记法有：</p> <ul><li><code>\d</code>：等价于 <code>[0-9]</code>，其中的 d 代表“数字（digit）”</li> <li><code>\w</code>：等价于 <code>[0-9a-zA-Z_]</code>，其中的 w 代表“单词字符（word）”</li> <li><code>\s</code>：等价于 <code>[ \t\r\n\v\f]</code>（方括号内的第一个字符是空格） ，s 表示“空白字符（space）”</li></ul> <p>字符组简记法可以单独出现，也可以使用在字符组中，比如 <code>[0-9a-zA-Z]</code> 也可以写作 <code>[\da-zA-Z]</code>，所以匹配十六进制字符的字符组可以写成 <code>[\da-fA-F]</code>。
字符组简记法也可以用在排除型字符组中，比如 <code>[^0-9]</code> 就可以写成 <code>[^\d]</code>，<code>[^0-9a-zA-Z_]</code> 就可以写成 <code>[^\w]</code>。</p> <p>对应排除型字符组简记法：</p> <ul><li><code>\D</code>：<code>\d</code> 能匹配的字符，<code>\D</code> 一定不能匹配</li> <li><code>\W</code>：<code>\w</code> 能匹配的字符，<code>\W</code> 一定不能匹配</li> <li><code>\S</code>：<code>\s</code> 能匹配的字符，<code>\S</code> 一定不能匹配</li></ul> <p><code>[\s\S]</code>、<code>[\w\W]</code>、<code>[\d\D]</code> 可以匹配任意字符。</p> <h2 id="字符组运算"><a href="#字符组运算" class="header-anchor">#</a> 字符组运算</h2> <p>了解即可。</p> <h2 id="posix-字符组"><a href="#posix-字符组" class="header-anchor">#</a> POSIX 字符组</h2> <p>了解即可。</p> <h2 id="总结"><a href="#总结" class="header-anchor">#</a> 总结</h2></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E5%AD%97%E7%AC%A6%E7%BB%84" title="标签">#字符组</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2023/07/09, 12:17:47</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><!----> <a href="/regex/quantifiers/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">量词</div></a></div> <div class="page-nav"><p class="inner"><!----> <span class="next"><a href="/regex/quantifiers/">量词</a>→
