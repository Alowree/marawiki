regex/assertions/#环视" class="sidebar-link">环视</a></li><li class="sidebar-sub-header level2"><a href="/regex/assertions/#补充" class="sidebar-link">补充</a><ul class="sidebar-sub-headers"><li class="sidebar-sub-header level3"><a href="/regex/assertions/#环视的价值" class="sidebar-link">环视的价值</a></li><li class="sidebar-sub-header level3"><a href="/regex/assertions/#环视与分组编号" class="sidebar-link">环视与分组编号</a></li><li class="sidebar-sub-header level3"><a href="/regex/assertions/#环视的支持程度" class="sidebar-link">环视的支持程度</a></li><li class="sidebar-sub-header level3"><a href="/regex/assertions/#环视的组合" class="sidebar-link">环视的组合</a></li><li class="sidebar-sub-header level3"><a href="/regex/assertions/#断言和反向引用之间的关系" class="sidebar-link">断言和反向引用之间的关系</a></li><li class="sidebar-sub-header level3"><a href="/regex/assertions/#逆序环视的诡异之处" class="sidebar-link">逆序环视的诡异之处</a></li></ul></li></ul></li><li><a href="/regex/useit/" class="sidebar-link">实战</a></li></ul> </aside> <div><main class="page"><div class="theme-vdoing-wrapper "><div class="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/note/regex/#《正则指引》笔记" data-v-06225672>《正则指引》笔记</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://github.com/alowree" target="_blank" title="作者" class="beLink" data-v-06225672>Alowree</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2023-06-11</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">文章目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABKFJREFUSA3tVl1oFVcQnrMbrak3QUgkya1akpJYcrUtIqW1JvFBE9LiQ5v6JmJpolbMg32rVrhgoYK0QiMY6i9Y6EMaW5D+xFJaTYItIuK2Kr3+BJNwkxBj05sQY3b3nM6cs2dv9t7NT/vQJw/sndk5M/PNzJkzewGerP+pAmy+ON8lLzUJgA8ZYxYIYZmGYRnctDaWvJJAmTtfP1pvXsBCCPP8QFcCaRkZYACgDZFO4stNIcBCajEOlmmC9XpJ9bAGCaPaPmzPl32dvLSVu3BWCTQs0XQQ6g0DYgwLIoAZbBCdW/i+781o1VVlm/410mw4h06Y7bIPHNyWDyL4FHkX03Q8SrzNhZTZriieckWt7cL6MM85YcLpsi/7O9/iXFT6MswI0DmmpkSaJ0qLxFIm3+i1THHB3zmBH3PYx9CcykcLOeQVVa7QtdxTgQgEleX2AjHYfwA+2ddV77ruGoJUbhGDI09YSNXyMpUt5ylOzxgbUmtOp7NmbNt8v3arjTBfYELmLUV+M+nSawNNAUqpT3ClJWg5I3BLT+cGW/DXNGCa6tx1aakCGEigArTn4TDIPdrXXYKCZNrHLMCOEPvHBlLQ99s9eHB7EB6NTki73CVPQ2F5MSx/uRQixfmq7rK0wYD8w8E905bnPDfwoWs/rfv93NWN/ZfvwsLIU7A09gxECyISeGJkHAau98L97tuw7NXnoPyNF8FcYGLGKsOs0mN3OEyec9esGW/ZEl945dTP34wlR2FZVQWU1q0Cw8Tr7p+hgLLNL0FPxx/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">断言<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>正则表达式中的大多数结构匹配的文本会出现在最终的匹配结果中（一般用 <code>group(0)</code> 可以得到），但是也有些结构并不真正匹配文本，而只负责判断在某个位置左/右侧的文本是否符合要求，这种结构被称为 <strong>断言</strong>（assertion）。常见的断言有三类：</p> <ul><li>单词边界</li> <li>行起始/结束位置</li> <li>环视</li></ul> <p></p><div class="table-of-contents"><ul><li><a href="#单词边界">单词边界</a></li><li><a href="#行起始-结束位置">行起始/结束位置</a></li><li><a href="#环视">环视</a></li><li><a href="#补充">补充</a><ul><li><a href="#环视的价值">环视的价值</a></li><li><a href="#环视与分组编号">环视与分组编号</a></li><li><a href="#环视的支持程度">环视的支持程度</a></li><li><a href="#环视的组合">环视的组合</a></li><li><a href="#断言和反向引用之间的关系">断言和反向引用之间的关系</a></li><li><a href="#逆序环视的诡异之处">逆序环视的诡异之处</a></li></ul></li></ul></div><p></p> <h2 id="单词边界"><a href="#单词边界" class="header-anchor">#</a> 单词边界</h2> <p>在文本处理中经常可能进行单词替换，比如把一段文本中的 row 都替换成 line。一般想到的是调用字符串的替换方法，直接替换 row。在不同语言中这些方法各不相同，但差别不大。</p> <p>[插图]
不过，这样替换也可能会造成意想不到的后果。</p> <p>[插图]
不仅所有单词 row 都被替换成了 line, tomorrow 和 rowdy 两个单词内部的 row 也被替换成了 line，这显然不是我们想要的结果。</p> <p>要解决这个问题，必须有办法确定 <strong>单词</strong> row，而不是 <strong>字符串</strong> row。为解决这类问题，正则表达式提供了专用的 <strong>单词边界</strong>（word boundary），记为 <code>\b</code>。它匹配的是“单词边界”位置，而不是字符。也就是说，<code>\b</code> 能够匹配这样的位置：一边是单词字符，另一边不是单词字符，如图 4-1 所示。</p> <p>[插图]</p> <p><strong>图 4-1　单词边界的匹配</strong></p> <p>表 4-1 更详细地说明了 row 配合单词边界 <code>\b</code> 之后的匹配情况。</p> <p><strong>表 4-1　单词边界的匹配</strong></p> <p>[插图]</p> <p>观察表格，可以发现两点：第一，单词边界 <strong>并不区分左右</strong>，在“单词边界”上，可能只有左侧是单词字符，也可能只有右侧是单词字符，总的来说，单词字符只能出现在一侧；第二，单词字符要求“<strong>另一边不是单词字符</strong>”，而不是“<strong>另一边的字符不是单词字符</strong>”，也就是说，<strong>一边必须出现单词字符，另一边可以出现非单词字符，也可能没有任何字符</strong>。所以，如果字符串只包含单词 <code>word</code>，用 <code>\bword\b</code> 应该是可以匹配的，虽然 <code>w</code> 之前和 <code>d</code> 之后都没有任何字符。</p> <p>单词边界要求一侧必须出现单词字符，到底什么是单词字符呢？</p> <p>一般情况下，“单词字符”的解释是 <code>\w</code> 能匹配的字符。在 JavaScript、PHP、Python 2、Ruby 中，<code>\w</code> 只能匹配 <code>[0-9a-zA-Z_]</code>。所以在这些语言中，<code>\b\w+\b</code> 能准确匹配英文单词了。给定一段文本，就可以用 <code>\b\w+\b</code> 将所有的单词提取出来，如例 4-1，制表符、换行符都不在话下。</p> <p><strong>例 4-1　单词边界的匹配</strong></p> <p>[插图]</p> <p>在 Web 开发中，经常需要对某些单词标记高亮，一般的做法是在单词的前后加上 tag，比如 <code>&lt;span class=&quot;hl&quot;&gt;</code> 和 <code>&lt;/span&gt;</code>，这个功能也可以由单词边界配合正则表达式替换完成，代码见例 4-2。</p> <p><strong>例 4-2　使用单词边界，准确给单词标记高亮</strong></p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>In <span class="token punctuation">[</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">:</span> <span class="token keyword">import</span> re

In <span class="token punctuation">[</span><span class="token number">2</span><span class="token punctuation">]</span><span class="token punctuation">:</span> string <span class="token operator">=</span> <span class="token string">&quot;Tomorrow I will weare in brown standing in row 10 next to the rowdy guy.&quot;</span>

In <span class="token punctuation">[</span><span class="token number">3</span><span class="token punctuation">]</span><span class="token punctuation">:</span> rowWordRegex <span class="token operator">=</span> <span class="token string">r&quot;\brow\b&quot;</span>

In <span class="token punctuation">[</span><span class="token number">4</span><span class="token punctuation">]</span><span class="token punctuation">:</span> <span class="token keyword">print</span><span class="token punctuation">(</span>re<span class="token punctuation">.</span>sub<span class="token punctuation">(</span>rowWordRegex<span class="token punctuation">,</span> <span class="token string">r&quot;&lt;span class=\&quot;hl\&quot;&gt;\g&lt;0&gt;&lt;/span&gt;&quot;</span><span class="token punctuation">,</span> string<span class="token punctuation">)</span><span class="token punctuation">)</span>
Tomorrow I will weare <span class="token keyword">in</span> brown standing <span class="token keyword">in</span> <span class="token operator">&lt;</span>span <span class="token keyword">class</span><span class="token operator">=</span>\&quot;hl\&quot;<span class="token operator">&gt;</span>row<span class="token operator">&lt;</span><span class="token operator">/</span>span<span class="token operator">&gt;</span> <span class="token number">10</span> <span class="token builtin">next</span> to the rowdy guy<span class="token punctuation">.</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br></div></div><p>注意，原文 <code>print</code> 一行代码中，在 <strong>原生字符串</strong> 中双引号的使用方法有误。现变更为，在 <strong>原生字符串</strong> 中嵌套使用单双引号，代码如下：</p> <div class="language-python line-numbers-mode"><pre class="language-python"><code>In <span class="token punctuation">[</span><span class="token number">5</span><span class="token punctuation">]</span><span class="token punctuation">:</span> <span class="token keyword">print</span> <span class="token punctuation">(</span>re<span class="token punctuation">.</span>sub<span class="token punctuation">(</span>rowWordRegex<span class="token punctuation">,</span> <span class="token string">r'&lt;span class=&quot;hl&quot;&gt;\g&lt;0&gt;&lt;/span&gt;'</span><span class="token punctuation">,</span> string<span class="token punctuation">)</span><span class="token punctuation">)</span>
Tomorrow I will weare <span class="token keyword">in</span> brown standing <span class="token keyword">in</span> <span class="token operator">&lt;</span>span <span class="token keyword">class</span><span class="token operator">=</span><span class="token string">&quot;hl&quot;</span><span class="token operator">&gt;</span>row<span class="token operator">&lt;</span><span class="token operator">/</span>span<span class="token operator">&gt;</span> <span class="token number">10</span> <span class="token builtin">next</span> to the rowdy guy<span class="token punctuation">.</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>但是也有些单词，<code>\b\w+\b</code> 是无能为力的，比如 <code>e-mail</code> 和 <code>M.I.T.</code>。因为连字符 <code>-</code> 和点号 <code>.</code> 都不能由 <code>\w</code> 匹配，所以 <code>\b\w+\b</code> 无法匹配 <code>e-mail</code>，也无法匹配 <code>M.I.T.</code>。如果确实希望处理 <code>e-mail</code> 之类的“单词”，也可以把表达式改为 <code>\b[-\w]+\b</code>。</p> <p>如果使用的是 .NET 或者 Python 3，在默认情况下，<code>\w</code> 不仅仅等价于 <code>[0-9a-zA-Z_]</code>，还能匹配各种语言中的“单词字符”，包括中文字符，这时 <code>\b</code> 的使用就有很大不同，具体情况现在不展开。</p> <p>与单词边界 <code>\b</code> 对应的还有非单词边界 <code>\B</code>，两者的关系类似 <code>\s</code> 和 <code>\S</code>、<code>\w</code> 和 <code>\W</code>、<code>\d</code> 和 <code>\D</code>：在同一种语言中，不管 <code>\b</code> 是如何规定的，<code>\b</code> 能匹配的位置，<code>\B</code> 就不能匹配；<code>\B</code> 能匹配的位置，<code>\b</code> 就不能匹配。但是在实际使用中，<code>\B</code> 使用频率远远少于 <code>\b</code>，所以暂不做详细介绍。</p> <h2 id="行起始-结束位置"><a href="#行起始-结束位置" class="header-anchor">#</a> 行起始/结束位置</h2> <p>单词边界匹配的是某个位置而不是文本，在正则表达式中，这类匹配位置的元素叫作 <strong>锚点</strong>（anchor），它用来“定位”到某个位置。除了刚才介绍的 <code>\b</code>，常用的锚点还有 <code>^</code> 和 <code>$</code>。通常来说，它们分别匹配字符串的开始位置和结束位置，所以可以用来判断“整个字符串能否由表达式匹配”。这两个锚点在第 1 章粗略介绍过，现在仔细讲解。</p> <p>一般情况下，<code>^</code> 匹配 <strong>整个字符串的起始位置</strong>。</p> <p>[插图]</p> <p>依靠 <code>^</code>，就可以用正则表达式 <code>^Some</code> 准确验证字符串“是否以 Some 开头”，因为 <code>^</code> 会把整个表达式的匹配“定位”在字符串的开始位置。这样，即便表达式的其他部分可以在字符串中其他位置找到匹配，整个表达式也无法匹配成功。</p> <p>在某些情况下，<code>^</code> 也可以匹配字符串内部的“行起始位置”。在讲解这种情况之前，我们先来看看行是怎么划分的。</p> <p>在编辑文本时，敲回车键就输入 <strong>行终止符</strong>（Line terminal），结束当前行，新起一行。看起来，这很好理解，然而不同平台上的行终止符其实各不相同，表 4-2 列出了常见平台下的“行终止符”（这里不说“回车”而说“行终止符”是为了避免混淆，因为 <code>\r</code> 字符就叫“回车（符）”，而 <code>\n</code> 字符叫作“换行符”，“这里的回车是由回车符和换行符构成的”之类说法容易引起误解）。</p> <p><strong>表 4-2　不同平台下的行终止符</strong></p> <table><thead><tr><th>平台</th> <th>行终止符</th></tr></thead> <tbody><tr><td>UNIX/Linux</td> <td><code>\n</code></td></tr> <tr><td>Windows</td> <td><code>\r\n</code></td></tr> <tr><td>Mac OS</td> <td><code>\n</code></td></tr></tbody></table> <p>有些资料上说 Mac OS 中的换行符是 <code>\r</code>，这并不算错，但只有 OS 9 之前的版本中，换行符才是 <code>\r</code>。从 OS X 开始，换行符与 UNIX/Linux 一样都是 <code>\n</code>，考虑到 OS 9 距今已经很久了，本书不考虑 <code>\r</code> 的情况。可参考 http://en.wikipedia.org/wiki/Newline。</p> <p>也就是说，每一行的“起始位置”，就是“行终止符”之后的那个位置，如果没有专门的符号，就要考虑各种“行终止符”。下面的例子看得更清楚，为了让换行符“可见”，我们用 <kbd>NL</kbd> 表示。</p> <div class="language-markdown line-numbers-mode"><pre class="language-markdown"><code>first line
second line
last line
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>它其实是下面这样，其中的 <kbd>NL</kbd> 可能是 <code>\n</code>，也可能是 <code>\r\n</code>。</p> <p>first line<kbd>NL</kbd>second line<kbd>NL</kbd>last line</p> <p>如果把匹配模式设定为 <strong>多行模式</strong>（Multiline Mode，这是一种影响元字符匹配的设定，下一章详细讲解）下，<code>^</code> 就既可以匹配整个字符串的起始位置，也可以匹配换行符之后的位置（设定多行模式最简单的办法是在正则表达式之前加上 <code>(?m)</code>，这里虽然出现了括号，但因为是专用于指定匹配模式，所以 <strong>不会</strong> 作为捕获分组）。</p> <p>[插图]</p> <p>注意，如果字符串的末尾出现了行终止符，<code>^</code> 也会匹配这个行终止符之后的位置。这样做是有意义的，比如要在每行开头加上特殊标注（最常见的处理是把纯文本格式转换为 HTML 格式），末尾的空行自然不应该漏掉。不过一般来说，<code>^</code> 的主要用途是与其他子表达式配合，比如像例 4-3 那样，提取每行的第一个单词。</p> <p><strong>例 4-3　提取每行的第一个单词</strong></p> <p>[插图]</p> <p>有些时候，我们无论如何也不想定位到字符串内部的行起始位置，只关心整个字符串的起始位置，则可以使用 <code>\A</code>，绝大多数工具中的正则表达式都支持这个锚点，它在任何情况下（包括多行模式下）都只匹配整个字符串的起始位置，如例 4-4 所示。</p> <p><strong>例 4-4　匹配整段文本的第一个单词</strong></p> <p>[插图]</p> <p>“行结束位置”的情况更复杂。除去“行终止符”可能由各种字符表示的情况之外，“行结束位置”可能没有任何字符，还是上面的字符串，你猜猜它有几个行终止符？</p> <p>字符串：Some sample text</p> <p>可能一：Some sample text</p> <p>可能二：Some sample text<kbd>NL</kbd>，而且其中的 <kbd>NL</kbd> 可能是 <code>\n</code>，也可能是 <code>\r\n</code>。</p> <p>如果要匹配字符串的最后一个单词，不但必须考虑 <kbd>NL</kbd> 所对应字符的多种可能，而且要兼顾 <kbd>NL</kbd> 是否出现，情况更加复杂。</p> <p>针对这种问题，正则表达式提供了“通吃”行结束符的锚点 <code>$</code>，它匹配的同样是位置。通常它匹配的是整个字符串的结尾位置—如果最后是行终止符，则匹配行终止符之前的位置；否则，匹配最后一个字符之后的位置。</p> <table><thead><tr><th>字符串<div style="width:100px;"></div></th> <th>Some sample text</th></tr></thead> <tbody><tr><td>字符串 1</td> <td>Some sample text</td></tr> <tr><td><code>$</code> 能匹配的位置</td> <td><del>Some sample text</del>$\uparrow$</td></tr> <tr><td>字符串 2</td> <td>Some sample text<kbd>NL</kbd></td></tr> <tr><td><code>$</code> 能匹配的位置</td> <td><del>Some sample text</del>$\uparrow$</td></tr></tbody></table> <p>这时候，无论 <kbd>NL</kbd> 是什么，是否存在，都可以用表达式 <code>\w+$</code> 匹配最后一个单词，代码见例 4-5。</p> <p><strong>例 4-5　匹配整段文本的最后一个单词</strong></p> <p>[插图]</p> <p>如果指定了多行模式，<code>$</code> 会匹配每个行终止符之前的位置。最后一行的情况有点特殊：如果最后一行没有行终止符，则匹配字符串的结尾位置；否则，匹配行终止符之前的位置。</p> <p>[插图]</p> <p>如果指定了多行模式，就可以用 <code>\w+$</code> 匹配每一行的最后一个单词了，代码见例 4-6。</p> <p><strong>例 4-6　匹配每行的最后一个单词</strong></p> <p>[插图]</p> <p>与 <code>$</code> 类似的还有两个特殊标记 <code>\Z</code> 和 <code>\z</code>，它们不受多行模式的影响，在任何情况下都匹配整个字符串的结束位置。<code>\Z</code> 和 <code>\z</code> 的主要差别在于：<code>\Z</code> 等价于默认模式（非多行模式）下的 <code>$</code>，如果字符串的末尾有行终止符，则它匹配换行符之前的位置；<code>\z</code> 则不管行终止符，只匹配 <strong>整个字符串的结束位置</strong>。</p> <p>[插图]</p> <p>回过头来说 <code>^</code> 和<code>$</code>，这两个锚点第 1 章介绍过，从数据校验的例子可以看到，<code>re.search(pattern,string)</code> 只表示 <code>pattern</code> 能否在 <code>string</code> 中找到匹配，但是如果 <code>pattern</code> 只匹配 <code>string</code> 中的一部分，也不会返回 <code>None</code>；为了验证整个 <code>string</code> 能否由 <code>pattern</code> 匹配，通常的做法是在 <code>pattern</code> 两端加上 <code>^</code> 和 <code>$</code>，就像例 4-7 那样。</p> <p><strong>例 4-7　借助 <code>^</code> 和 <code>$</code> 完成数据验证</strong></p> <p>[插图]</p> <p>最常用到数据验证的场合就是对用户提交的数据进行验证，比如在网页上，要求用户在输入框（比如密码、邮箱）中填入某些信息，加以验证。一般来说，输入框中都不能输入换行符，但如果用户使用程序来提交，接收到的值就可能包含换行符。在这种情况下，在正则表达式两端添加 <code>^</code> 和<code>$</code>是无法准确验证的，因为<code>$</code>可以匹配“结尾行终止符之前的位置”，验证时就忽略了末尾的行终止符。使用 <code>\z</code> 替换<code>$</code>可以堵住这个漏洞（使用 <code>\z</code> 时，最好把 <code>^</code> 也替换成 <code>\A</code>，这样更符合习惯，因为一般 <code>^</code> 是和<code>$</code>成对出现的）。下面用 Python 为例说明这一点（因为 Python 不支持 <code>\z</code>，但是 Python 中的 <code>\Z</code> 等价于其他语言中的 <code>\z</code>，所以例 4-8 使用 <code>\Z</code>）。</p> <p><strong>例 4-8　借助 <code>\A</code> 和 <code>\Z</code> 完成更准确的数据验证</strong></p> <p>[插图]</p> <p>类似 Python 中的 <code>\Z</code>，JavaScript 中的 <code>$</code> 的匹配也比较特殊，JavaScript 没有提供 <code>\A</code>、<code>\z</code>、<code>\Z</code>，只有 <code>^</code> 和 <code>$</code>，但是 JavaScript 中的 <code>$</code>，只能匹配字符串/行的结束位置，即便字符串末尾有换行符，也是如此，所以在验证时，可以放心使用 <code>^</code> 和 <code>$</code>。JavaScript 代码见例 4-9。</p> <p><strong>例 4-9　JavaScript 中的验证</strong></p> <p>[插图]</p> <p><code>^</code> 和 <code>$</code> 的另一个特点是，进行正则表达式替换时并不会被替换。也就是说，在起始/结束位置进行替换，只会在起始/结束位置添加一些字符，位置本身仍然存在。使用这个特性，我们可以很方便地转换文本的格式。常见的应用是将纯文本转换为 HTML，比如将纯文本的电子文档转换成 ePub 格式，就需要如此处理。这个问题最简单的思路是，使用多行模式将 <code>^</code> 替换为 <code>&lt;p&gt;</code>，将 <code>$</code> 替换为 <code>&lt;/p&gt;</code>，如例 4-10 所示，注意其中使用了多行模式，这样可以找到字符串内部文本行的开始和结束位置。</p> <p><strong>例 4-10　<code>^</code> 和 <code>$</code> 的替换</strong></p> <p>[插图]</p> <p><code>^</code> 和 <code>$</code> 的另一个常用功能是删去多余的空白，包括行首尾的空白和空行。因为种种原因，要处理的文本可能经常包含许多空白字符，有些出现在行首，有些出现在行尾，还可能有不少空行。</p> <p>[插图]</p> <p>如果要整理格式，需要删掉不必要的空白字符，但又不能把所有空白字符都删掉（单词与单词之间的空白字符应当保留）。所以要做的其实是删除行首和行尾的空白字符，我们先删除行首的空白字符，使用的正则表达式是 <code>(?m)^\s+</code>。</p> <p>这里必须使用多行模式，否则就只能删除整个字符串首尾的空白字符。另一方面，此处使用了量词 <code>+</code> 而不是 <code>*</code>，因为 <code>^\s*</code> 可以不匹配任何字符，这样的“删除”没有意义。将 <code>(?m)^\s+</code> 匹配的文本替换为空字符串，就执行了删除操作（一般正则表达式应用中没有单独的“删除”操作，删除操作都是通过将文本替换为空字符串实现的）。[3] 例 4-11 展示了去除字符串行首空白字符的代码。</p> <p><strong>例 4-11　去除行首的空白字符</strong></p> <p>[插图]</p> <p>为方便观察，仍然用上面的方式显示字符串。</p> <p>[插图]</p> <p>因为 <code>\s</code> 匹配的空白字符中包含换行符 <code>\n</code>，所以完全是空白字符的第 3 行（连同换行符）也被删掉了。现在来删行尾的空格，使用表达式 <code>\s+$</code>，同样要记得使用多行模式，如例 4-12 所示。</p> <p><strong>例 4-12　去除行尾的空白字符</strong></p> <p>[插图]</p> <p>仍然用上面的方式显示字符串。</p> <p>[插图]</p> <p>能不能用多选结构 <code>(^\s+|\s+$)</code> 并列两个表达式，一步完成呢？答案是 <strong>不能</strong>。</p> <p>[插图]</p> <p>不但第三行被删除，第二行和第四行也合并成一行，中间的 <code>\t\n\n</code> 全部被删除了，第二行末尾没有了换行符；而真正的目的其实只是想将 <code>\t\n\n</code> 替换为 <code>\n</code>。仔细看看正则表达式 <code>(^\s+|\s+$)</code> 就可以知道，在 <code>\s+$</code> 中，<code>\s</code> 可以匹配 <code>\t</code> 和 <code>\n</code>，所以 <code>\s+$</code> 可以匹配开始的 <code>\t\n</code>，同样 <code>^\s+</code> 可以匹配结尾的 <code>\n</code>，所以 <code>\t\n\n</code> 经过两步被彻底删除了。</p> <p>这个例子所用的表达式很有意思 [4]，它提醒我们用多选结构合并多个表达式时，一定要小心未曾预期的后果；有时候，分几步进行反而能省去许多麻烦，这类例子在第 9 章还要讲到。</p> <h2 id="环视"><a href="#环视" class="header-anchor">#</a> 环视</h2> <p>前面介绍过单词边界匹配的是这样的位置：一边是单词字符，另一边不是单词字符。从另一个角度来看，它能进行这样的判断：在某个位置向左/向右看，必须出现或不能出现某类字符。有时候，这种功能非常有用。</p> <p><strong>open tag 的正则表达式--使用分组</strong></p> <p>在第 2 章，用表达式 <code>&lt;[^/&gt;][^&gt;]*&gt;</code> 匹配 open tag，它保证了 <code>&lt;</code> 之后不会出现 <code>/</code>，这样就排除了 <code>&lt;/img&gt;</code> 之类的 close tag，但它也可以匹配 self-closing tag，比如 <code>&lt;br /&gt;</code> 。如果将表达式改为 <code>&lt;[^/][^&gt;]*[^/]&gt;</code>，又会有一个问题，在 <code>&lt;</code> 和 <code>&gt;</code> 中的 <code>[^/][^&gt;]*[^/]</code>，能匹配的文本至少包含两个字符，所以它无法匹配 <code>&lt;u&gt;</code>。</p> <p>第 3 章运用括号的 <strong>分组</strong> 构造了正则表达式 <code>&lt;[^/]([^&gt;]*[^/])?&gt;</code> 解决了这个问题。</p> <p><strong>open tag 的正则表达式--使用环视</strong></p> <p>但是仔细想想，也可以从另一个角度描述：在开始位置匹配 <code>&lt;</code>，同时要求这个 <code>&lt;</code> 之后不能是 <code>/</code>；然后匹配中间的文本，除非在属性（也就是引号字符串）中，否则不能出现 <code>&gt;</code>，且长度必须大于 1（<code>&lt;&gt;</code> 不是合法的 tag）；最后匹配 <code>&gt;</code>，同时要求这个 <code>&gt;</code> 之前不能是 <code>/</code>。</p> <p>这样描述更加准确，逻辑也更清晰，可以用三个子表达式分别匹配这三个部分。单独来看，开头的 <code>&lt;</code>、中间的内容、结尾的 <code>&gt;</code> 都不难匹配，但必须解决一个问题：匹配开头的 <code>&lt;</code> 时，除去找到 <code>&lt;</code> 字符，还必须向后（向右）看看，确认字符不能是 <code>/</code>，同时又不能真正匹配这个字符，因为 <code>&lt;</code> 和 <code>&gt;</code> 中间的文本是有单独的子表达式匹配的；同样，结尾 <code>&gt;</code> 的匹配也是如此。</p> <p>针对这种要求，正则表达式专门提供了 <strong>环视</strong>（look-around）用来“停在原地，四处张望”。环视类似单词边界，在它旁边的文本需要满足某种条件，而且本身不匹配任何字符。</p> <p>比如正则表达式 <code>&lt;(?!/)</code>，其中的 <code>(?!/)</code> 是一个环视结构，<code>(?!…)</code> 是这个结构的标识，<code>/</code> 才是真正的表达式，整个结构的意思是“当前位置之后（右侧），不允许出现 <code>/</code> 能匹配的文本”。看起来它和 <code>&lt;[^/]</code> 类似，其实大不相同：如果 <code>&lt;(?!/)</code> 匹配成功，正则表达式真正匹配完成的只有 <code>&lt;</code>，而不包括 <code>&lt;</code> 之后的那个字符，这样，就能准确表示“匹配 <code>&lt;</code>，同时这个 <code>&lt;</code> 之后不能是 <code>/</code>”。</p> <p>再来看表达式 <code>(?&lt;!/)&gt;</code>，其中的 <code>(?&lt;!/)</code> 也是一个环视结构，<code>(?&lt;!…)</code> 是这个结构的标识，<code>/</code> 才是真正的表达式，整个结构的意思是“在当前位置之前（左侧），不允许出现 <code>/</code> 能匹配的文本”（它与上面的 <code>(?!/)</code> 类似，只是多了一个 <code>&lt;</code>，更加形象地指向左侧）。这样，就能准确地表示“匹配 <code>&gt;</code>，同时 <code>&gt;</code> 之前不能是 <code>/</code>”。</p> <p>至于 <code>&lt;</code> 和 <code>&gt;</code> 之间的文本，在第 3 章曾讲解过，可以用 <code>('[^']*'|&quot;[^&quot;]*&quot;|[^'&quot;&gt;])+</code> 准确匹配。
最后，把这三个部分结合起来，得到正则表达式 <code>&lt;(?!/)('[^']*'|&quot;[^&quot;]*&quot;|[^'&quot;&gt;])+(?&lt;!/)&gt;</code>，它可以准确匹配 open tag，而且不会错误匹配 self-closing tag，匹配情况如图 4-2 所示，代码见例 4-13。</p> <p>[插图]</p> <p><strong>图 4-2　匹配 open tag 的表达式（注意环视结构并不会真正匹配文本）</strong></p> <p><strong>例 4-13　使用环视结构，准确匹配 open tag</strong></p> <p>[插图]</p> <p>在这个表达式中出现了两种环视：<code>(?!…)</code> 和 <code>(?&lt;!…)</code>，它们的名字分别是“否定顺序环视”和“否定逆序环视”。“否定”的意思是“如果正则表达式匹配成功，则在当前位置匹配失败”，而“顺序”和“逆序”则表示正则表达式需要匹配的文本所在的位置。所以总的来说，环视一共分为 4 种：<strong>肯定顺序环视</strong>（positive-lookahead）、<strong>否定顺序环视</strong>（negative-lookahead）、<strong>肯定逆序环视</strong>（positive-lookbehind）、<strong>否定逆序环视</strong>（negative-lookbehind）。环视的分类见表 4-4。</p> <p><strong>表 4-4　环视的分类</strong></p> <table><thead><tr><th>名字</th> <th>记法</th> <th>判断方向</th> <th>结构内表达式成功匹配的返回值</th></tr></thead> <tbody><tr><td>肯定顺序环视</td> <td><code>(?=…)</code></td> <td>向右</td> <td><code>True</code></td></tr> <tr><td>否定顺序环视</td> <td><code>(?!…)</code></td> <td>向右</td> <td><code>False</code></td></tr> <tr><td>肯定逆序环视</td> <td><code>(?&lt;=…)</code></td> <td>向左</td> <td><code>True</code></td></tr> <tr><td>否定逆序环视</td> <td><code>(?&lt;!…)</code></td> <td>向左</td> <td><code>False</code></td></tr></tbody></table> <ul><li><code>\d+(?=PM)</code>：匹配类似于 <code>3PM</code> 这样后面带 <code>PM</code> 的时间数字 <code>3</code></li> <li><code>\d+(?!=PM)</code>：匹配一般的数字，但类似于 <code>3PM</code> 这样后面带 <code>PM</code> 的时间数字 <code>3</code> 则不予匹配</li> <li><code>(?&lt;=\$)\d+</code>：匹配类似于 <code>$5</code> 这样前面带 <code>$</code> 的数字 <code>5</code></li> <li><code>(?&lt;!\$)\d+</code>：匹配一般的数字，但类似于 <code>$5</code> 这样前面带 <code>$</code> 的数字 <code>5</code> 则不匹配</li></ul> <p>这 4 个名字容易混淆，不妨这样记忆：在当前位置，如果是朝右判断，则是顺序环视（lookahead），如果是朝左判断，则是逆序环视（lookbehind）；如果要求子表达式能匹配的字符串必须出现，则为肯定环视（positive），如果要求子表达式能匹配的字符串不能出现，则为否定环视（negative）。图 4-3 说明，对于字符串 <code>12345</code>，以 <code>\d{3}</code> 为表达式的四种环视能匹配的位置分别是：</p> <ul><li><code>(?=\d{3})</code>：右侧必须出现三个数字字符</li> <li><code>(?!\d{3})</code>：右侧不能出现三个数字字符</li> <li><code>(?&lt;=\d{3})</code>：左侧必须出现三个数字字符</li> <li><code>(?&lt;!\d{3})</code>：左侧不能出现三个数字字符</li></ul> <p>[插图]
<strong>图 4-3　对字符串 12345,4 种环视能匹配的位置</strong></p> <p>环视的最大特点是“匹配完成之后还停在原地”，之前已经看到 <code>&lt;(?!/)</code> 匹配的其实只有一个 <code>&lt;</code> 字符，<code>(?&lt;!/)&gt;</code> 匹配的也只有一个 <code>&gt;</code> 字符，虽然它们都需要测试 <code>/</code> 的匹配。有时候确实需要用到“原地”的判断，因为要寻找的确实只是位置，而不需要真正匹配任何字符，比如格式化数字字符串的格式，就是如此。</p> <p>英文中的数字更习惯用逗号分隔以方便阅读，比如 <code>12345</code> 应该写作 <code>12,345</code>。如果用正则表达式来完成任务，就是“把逗号添加到这样的位置：右侧的数字字符串的长度是 3 的倍数”，看起来只需要使用肯定顺序环视就足够了，用正则表达式找到这样的位置 <code>(?=(\d{3})+)</code>，将它“替换”为逗号（其实就是在这里塞进一个逗号），代码见例 4-14。</p> <p><strong>例 4-14　格式化数字字符串，第一次尝试</strong></p> <p>[插图]</p> <p>结果却不是想象的那样。因为“右侧数字字符串”严格说应该是“当前位置右侧，所有数字字符构成的字符串”；但是 <code>(?=(\d{3})+)</code> 并不能表达这个意思，比如第一个字符 <code>1</code> 之前的位置，右侧数字字符串长度为 5，但其中存在长度为 3 的子串，所以这个位置也可以匹配（如果这样说不够清楚的话，请仔细观察图 4-3）。同样，2、3 之前的位置都是如此。</p> <p>解决这个问题必须配合否定顺序环视，让 <code>(\d{3})+</code> 能匹配右侧的整个数字字符串，而不能只匹配其中的一个子串。也就是说，要一直匹配到“右侧不再有数字字符的位置”为止。所以，必须将表达式改写为 <code>(?=(\d{3})+(?!\d))</code>，结果如例 4-15 所示。</p> <p><strong>例 4-15　格式化数字字符串，第二次尝试</strong></p> <p>[插图]</p> <p>似乎没问题了，但是从例 4-16 看，如果字符串的长度正好是 3 的倍数，还是有问题。</p> <p><strong>例 4-16　格式化数字字符串，意外的情况</strong></p> <p>[插图]</p> <p>字符串的开头多出了一个逗号，因为这个位置右侧的数字字符串长度为 6。更严格地说，要加入逗号的位置其实是这样的：右侧的数字字符串的长度是 3 的倍数，且左侧也是数字字符。所以还需要加上肯定逆序环视，将正则表达式修改为 <code>(?&lt;=\d)(?=(\d{3})+(?!\d))</code>，如例 4-17 所示。</p> <p><strong>例 4-17　格式化数字字符串，最后的尝试</strong></p> <p>[插图]</p> <p>仔细观察这个例子可以发现，表达式中其实出现了三个环视结构，其中 <code>(?!\</code> 是一种组合，除去这个例子中出现的嵌套和并列两种组合，环视结构还可以通过其他方式组合。关于这几类组合，本章末尾有一节专门进行讲解。</p> <p>再举一个例子。</p> <p>我们经常会遇到中英文混排的文本，英文文本需要用空白字符来区分单词，中文文本中则很少出现空白字符。但是在转贴或格式转换时，经常会产生一些多余的空白字符：</p> <p>[插图]</p> <p>为了整理格式，需要删除这些空白字符。正则表达式匹配空白字符很容易，直接用 <code>\s+</code> 即可。但如果直接删除 <code>\s+</code> 能匹配的所有文本，就成了下面这样：</p> <p>[插图]</p> <p>所以真正要找的，其实是这样的 <code>\s+</code>：从它向左看，不能出现英文字母；从它向右看，也不能出现英文字母。所以需要在 <code>\s+</code> 的两端分别添加否定逆序环视和否定顺序环视，得到 <code>(?&lt;![a-zA-Z])\s+(?![a-zA-Z])</code>，结果如例 4-18 所示。</p> <p><strong>例 4-18　去掉中英文混排文本中不必要的空白字符</strong></p> <p>[插图]</p> <p>你或许会想，这个表达式能不能改一改，比如左侧的否定逆序环视 <code>(?&lt;![a-zA-Z])</code>，能不能改为肯定环视，指定出现一个非英文字符 <code>(?&lt;=[^a-zA-Z])</code>，右侧的否定顺序环视也改为肯定顺序环视 <code>(?=[^a-zA-Z])</code>？</p> <p>初看起来这并没有问题，但这个问题其实涉及肯定环视和否定环视的一大根本不同：肯定环视要判断成功，字符串中 <strong>必须有字符</strong> 由环视结构中的表达式匹配；而否定环视要判断成功，却有两种情况：字符串中出现了字符，但这些字符不能由环视结构中的表达式匹配；或者字符串中 <strong>不再有任何字符</strong>，也就是说，这个位置是字符串的起始位置或者结束位置。这两种环视的区别，可以通过例 4-19 展现。</p> <p><strong>例 4-19　使用不同的环视去掉空白字符</strong></p> <p>[插图]</p> <p>如果使用肯定环视，则无法去掉字符串首尾的空白。因为在字符串的开头，<code>\s+</code> 虽然能匹配空白字符，但其左侧并没有任何字符，所以 <code>(?&lt;=[^a-zA-Z])</code> 无法匹配成功；字符串末尾的 <code>(?=[^a-zA-Z])</code> 也是如此。
到现在为止，如果你觉得自己已经掌握了环视功能，来看一个更复杂的例子：在电子邮件地址中，更准确地进行主机名验证。</p> <p>在上一章，我们给出了一个匹配 E-mail 地址的表达式，但它还不够完整，尤其是主机名部分（hostname）的匹配。根据规范，主机名以点号分隔为多个域名字段（label），每个域名字段可以包含大小写字母、数字字母、横线，但是横线不能出现在开头位置。关于长度，每个域名字段的长度最多为 63 个字符，整个主机名的长度最多为 255 个字符。通常用的表达式是 <code>([-a-zA-Z0-9]{1,63}\.)*[-a-zA-Z0-9]{1,63}</code>，这个表达式有两个问题：第一，它允许域名字段的第一个字符是横线 <code>-</code>；第二，它没有限定整个主机名的长度最长为 255 个字符。为准确匹配主机名，就必须解决这两个问题。</p> <p>为保证域名字段的第一个字符不能是横线，可行的办法之一是单独匹配第一个字符，将表达式 <code>[-a-zA-Z0-9]{1,63}\.</code> 改写为 <code>[a-zA-Z0-9][-a-zA-Z0-9]{0,62}\.</code>；不过，在表达式开始加上否定顺序环视更加直接，也更加自然，也就是 <code>(?!-)[-a-zA-Z0-9]{1,63}\.</code>。</p> <p>为保证整个主机名字符串长度小于 255 个字符，主机名中全部可能出现的字符都用 <code>[-a-zA-Z0-9.]</code> 表示，所以对应的肯定顺序环视就是 <code>(?=[-a-zA-Z0-9.]{0,255})</code>，但是并不能直接把它添加到匹配主机名的整个表达式的开头，因为这个表达式只要求匹配一个长度在 255 个字符以内的字符串，并不能保证“之后的整个字符串长度在 255 个字符以内”。如果是单独给出一个字符串，验证它是否是合法的主机名，那么可以在这个环视中的表达式末尾添加 <code>$</code>；如果是要从一长段文本中提取出某个主机名，那么主机名之后还有其他字符，只是这些字符不能是 <code>[-a-zA-Z0-9.]</code>（可能是空白字符，也可能在字符串的末尾，之后没有任何字符），使用否定顺序环视 <code>(?![-a-zA-Z0-9.])</code> 就可以兼顾这两种情况。</p> <p>最终，我们得到了更准确匹配主机名的表达式。</p> <p>[插图]</p> <p>从例 4-20 可见，这个表达式确实可以更准确地验证主机名。</p> <p><strong>例 4-20　准确匹配主机名的正则表达式</strong></p> <p>[插图]</p> <h2 id="补充"><a href="#补充" class="header-anchor">#</a> 补充</h2> <h3 id="环视的价值"><a href="#环视的价值" class="header-anchor">#</a> 环视的价值</h3> <p>环视有一个很重要的用途，就是避免编写正则表达式时“牵一发动全身”的尴尬—既可以集中关注某个部分，添加复杂的限制，又不会干扰其他部分的匹配。有些时候，为添加某些限制而真正匹配文本，反而会影响整个表达式的匹配。</p> <p>回想匹配 open tag 的例子：open tag 要求 <code>&lt;</code> 之后不能出现 <code>/</code>（否则就是 close tag，比如 <code>&lt;/a&gt;</code>），而 <code>&gt;</code> 之前不能出现 <code>/</code>（否则就是 self-closing tag，比如 <code>&lt;img…/&gt;</code>）；而 <code>&lt;</code> 和 <code>&gt;</code> 之间的内容一般使用 <code>[^&gt;]+</code> 匹配。如果使用 <code>&lt;[^/][^&gt;]+[^/]&gt;</code>，则 <code>&lt;</code> 和 <code>&gt;</code> 之间必须出现至少三个字符，即便是 <code>&lt;[^/][^&gt;]*[^/]&gt;</code>，<code>&lt;</code> 和 <code>&gt;</code> 之间也必须至少出现两个字符，都无法匹配 <code>&lt;u&gt;</code>，看来很麻烦。</p> <p>如果使用环视，则非常容易解决：在 <code>&lt;</code> 之后加上环视 <code>(?!/)</code>，就只匹配 <code>&lt;</code>，同时保证匹配的 <code>&lt;</code> 之后不是 <code>/</code>；在 <code>&gt;</code> 之前加上环视 <code>(?&lt;!/)</code>，也是如此；剩下的内容仍然由 <code>[^&gt;]+</code> 匹配。这样结果清晰了很多，三个部分互不干扰，所以整个表达式就是 <code>&lt;(?!/)[^&gt;]+(?&lt;!/)&gt;</code>。</p> <p>环视的另一点价值在于，提取数据时杜绝错误的匹配。比如匹配邮政编码，直接的想法是找到 6 位数字构成的字符串，但仅仅用 <code>\d{6}</code> 提取，很可能在手机号码 <code>13812345678</code>、电话号码 <code>28812506</code> 等其他数据中找到 6 位数字构成的字符串。如果在表达式首尾添加环视，改为 <code>(?&lt;!\d)\d{6}(?!\d)</code>，就可以保证准确匹配 6 位数字构成的字符串。一般来说，<strong>凡是从文本中提取“有长度特征的数据”，都需要用到环视</strong>。</p> <p>还有些时候，可以在匹配的同时以环视施加限制，达到“双管齐下”的效果。举一个例子，Java 和 .NET 的正则表达式都提供了字符组运算的功能，比如匹配所有的辅音字母，最简单的思路是“从 26 个字母中减去 5 个元音字母”，在 .NET 中可以写作 <code>[a-z-[aeiou]]</code>，在 Java 中可以写作 <code>[[a-z]&amp;&amp;[^aeiou]]</code>。如果使用其他语言，则没有这种便利，只能写作 <code>[b-df-hj-np-tv-z]</code>，不但烦琐，而且不便理解。但是使用环视则非常简单，写作 <code>(?![aeiou])[a-z]</code>，<code>[a-z]</code> 真正匹配的是一个小写字母，但环视 <code>(?![aeiou])</code> 同时要求这个字母不能由 <code>[aeiou]</code> 匹配，最终效果就是“从 26 个字母中减去 5 个辅音字母”。</p> <h3 id="环视与分组编号"><a href="#环视与分组编号" class="header-anchor">#</a> 环视与分组编号</h3> <p>环视结构也要用到括号，这种括号是否会影响到分组编号呢？
前面说过，分组的编号只与捕获型括号有关，而不受其他任何类型括号的影响。所以，环视结构中虽然必须用到括号字符，但这里的括号只是结构需要，并不影响捕获分组，参见例 4-21。</p> <p><strong>例 4-21　单纯的环视结构并不影响引用分组</strong></p> <p>[插图]</p> <p>前面说过，括号有多种用途，比如表示多选结构。即便括号只表示多选结构，如果没有显式指定为非捕获型括号 <code>( ?:… )</code>，也会被视为捕获型括号，这时候结果就大不一样了，参见例 4-22。</p> <p><strong>例 4-22　环视结构中出现了捕获型括号，会影响分组</strong></p> <p>[插图]</p> <p>这一点在实际使用中往往容易被忽略，认为环视结构并不会影响“真正”的匹配，其中的表达式匹配的文本不能从匹配结果中得到，结果算错了真正需要的分组编号。</p> <p>而且，环视结构中的捕获型括号一旦匹配完成，就不能回溯。在某些情况下，这可能带来非常奇怪的问题。比如表达式 <code>(\d+)\w+\1</code>，它可以匹配 <code>123a12</code>，其中 <code>\d+</code> 匹配 <code>12</code>，<code>\w+</code> 匹配 <code>3a</code>，<code>\1</code> 反向引用 <code>\d+</code> 匹配的 <code>12</code>。但是，将这个表达式改为 <code>(?&lt;=(\d+))\w+\1</code>，却无法在 <code>123a12</code> 中找到匹配，因为一开始 <code>\d+</code> 就会匹配 <code>123</code>，之后跳出环视结构，这时 <code>\d+</code> 保存的备用状态全部消失了，所以无法交还 <code>3</code> 给 <code>\w+</code> 匹配，导致整个表达式匹配失败。
不过，需要用到这种表达式的情况很罕见，而且环视中能出现的表达式往往会有限制，不见得允许出现括号。</p> <h3 id="环视的支持程度"><a href="#环视的支持程度" class="header-anchor">#</a> 环视的支持程度</h3> <p>常用的语言（除去 Golang）大都支持环视，但语言不同，支持的程度也不同，下面详细讲解。
一般来说，所有语言都支持两种顺序环视，而且没有限制。也就是说，无论你使用肯定顺序环视，还是否定顺序环视，都可以在其中使用各种复杂的表达式。</p> <p>逆序环视的情况则没有这么乐观，Ruby 1.8 中的正则表达式并不支持逆序环视，其他语言虽然支持逆序环视，但对逆序环视中的表达式能匹配的文本长度有限制 [5]：Python 只支持匹配固定长度文本的表达式，而 Java、PHP、Objective-C 只支持匹配有限长度文本的表达式，.NET 和 JavaScript（ES2017，或者 TC39）没有任何限制。下面我们依次讲解这几种情况以及应急的解决办法。</p> <p><strong>Ruby 1.8</strong>
Ruby 1.8 不支持逆序环视。如果确实需要用到逆序环视，而且只用到肯定逆序环视，不妨采用分组来替代，比如把表达式 <code>(?&lt;=dog)s</code> 改写为 <code>dog(s)</code>。注意，我们给 <code>s</code> 添加了一个括号，如果使用 <code>(?&lt;=dog)s</code>，需要提取整个表达式匹配的文本，但使用 <code>dog(s)</code>，只需要提取编号为 <code>1</code> 的分组捕获的文本即可。当然也可以更进一步，对 <code>dog</code> 使用非捕获型括号，写成 <code>(?:dog)s</code>，思路与 <code>dog(s)</code> 相同，却不需要改动原有的分组编号。</p> <p>但是，这个办法只对肯定逆序环视有效，而不能用于否定逆序环视，因为逆序环视是“从右向左”判断的，其他结构都是“从左向右”判断的，如果逆序环视中表达式能匹配的字符串长度是不固定的，就很难确定“从左向右”判断时的起点。</p> <p>即便否定逆序环视中表达式能匹配的字符串长度是固定的，也难以用其他结构解决。比如表达式 <code>(?&lt;!dog)s</code>，要求 <code>s</code> 左侧不能出现 <code>dog</code>，或许你会想用表达式 <code>(?!dog)(?:.{3})s</code>，但是即便字符串 <code>s</code> 或者 <code>is</code> 也无法匹配，因为这时候 <code>s</code> 左侧或者是空字符串，或者是只包含字母 <code>i</code> 的字符串，而表达式中 <code>s</code> 左侧的 <code>.{3}</code> 要求匹配三个字符。看来，表达式要改为 <code>(?!dog)(?:.{0,3})s</code>，但是这时候，它又可以匹配 <code>dogs</code> 中的 <code>ogs</code> 或者 <code>gs</code>……总的来说，没有什么好的解决办法。</p> <p><strong>Python、Ruby 1.9</strong>
Python 规定在逆序环视中的表达式能匹配的文本长度必须是固定的。也就是说，<code>(?&lt;=dog)</code> 是合法的，<code>(?&lt;=(dog|cat))</code> 也是合法的，因为环视中的子表达式能匹配的文本都是固定的；而 <code>(?&lt;=dogs?)</code> 和 <code>(?&lt;=(dog|cats))</code> 则都不合法，因为环视中的子表达式能匹配的文本长度不确定。</p> <p>要解决这个问题，可以用多选结构来改造表达式。比如，<code>dogs?</code> 等价于 <code>(dog|dogs)</code>，所以 <code>(?&lt;=dogs?)</code> 可以改写为 <code>((?&lt;=dog)|(?&lt;=dogs))</code>，同样，<code>(?&lt;=(dog|cats))</code> 可以改写为 <code>((?&lt;=dog)|(?&lt;=cats))</code>；但是这种办法的应用场景有限，如果逆序环视中的表达式比较复杂，用多选结构列出就非常麻烦；而且一旦表达式中出现了 <code>*</code> 和 <code>+</code> 之类的量词，就根本不可能用多选结构列出了。</p> <p><strong>PHP</strong>
PHP 对逆序环视中表达式的限制要宽松点，它能匹配文本的长度可以不必限定，但是长度必须是确定的数值：<code>(?&lt;=dog|cats)</code> 是没问题的，因为两个分支的长度都是固定的；而 <code>(?&lt;!dogs?|cats?)</code> 则有问题，因为两个分支的长度都是不确定的。</p> <p>要解决这个问题，可以将 <code>(?&lt;!dogs?|cats?)</code> 改写为 <code>(?&lt;!dog|dogs|cat|cats)</code>。但是要注意，根据 PHP 中正则表达式的规定，长度固定但不相同的多选分支，只能出现在顶级的多选结构中。也就是说，<code>(?&lt;=ab(c|de))</code> 是不支持的，而 <code>(?&lt;=abc|abde)</code> 则是支持的。</p> <p><strong>Java</strong>
Java 对逆序环视中表达式的限制比 PHP 还要宽松，它能匹配的文本可以没有确定长度，但是必须有上限。所以 <code>(?&lt;!dogs?|cats?)</code> 是没有问题的，甚至 <code>(?&lt;!ab(c|de))</code> 也是没有问题的，但是 <code>(?&lt;!(dogs?){3,})</code> 则不行，编译时会报告无法确定环视中表达式能匹配文本的最大长度。</p> <p><strong>Objective-C</strong>
Objective-C 对逆序环视中表达式的限制与 Java 相同，能匹配的文本可以没有确定长度，但是必须有上限。所以 <code>(?&lt;!dogs?|cats?)</code> 是没有问题的，甚至 <code>(?&lt;!ab(c|de))</code> 也是没有问题的，但是 <code>(?&lt;!(dogs?){3,})</code> 则不行，编译时会报告无法确定环视中表达式能匹配文本的最大长度。</p> <p><strong>.NET</strong>
.NET 对逆序环视的支持是最为完备的。在 .NET 里，逆序环视中的表达式没有任何限制，这是 .NET 的正则表达式最为人称道的一点。</p> <p><strong>JavaScript</strong>
JavaScript 对环视的支持比较复杂。“经典”（从 1999 年确定的 ES3 到 2005 年确定的 ES6）的 JavaScript 只支持顺序环视，不支持逆序环视。但是，最新版本的 ES（ES2017，也叫 TC39）大幅改善了对正则表达式的支持，JavaScript 中的正则表达式也可以使用逆序环视了。考虑到 ES2017 是 2017 年定稿发布的，你读到本书的时候，流行的浏览器都已经支持 ES2017 了，所以大多数情况下应当是可以放心使用的。</p> <p>尤其值得称道的是，ES2017 在制订时充分调研了业界流行的支持，没有遵循“通用”规则，约束环视结构中的子表达式能匹配的文本必须有确定长度，而是选择了与 .NET 相同的标准，不对环视结构中的子表达式做任何限制。</p> <p><strong>Golang</strong>
很遗憾，到目前（Version 1.9.2）为止，Golang 内置的 Regexp 不能支持任何环视功能。如果一定要使用环视，可以考虑之前的变通办法，或者采用其他第三方的正则库。因为 Golang 的历史不长，各种特性仍然在不断增加和变化，我们期待未来 Regexp 可以直接支持环视。</p> <p>总的来看，语言不同，对逆序环视的限制也不相同。逆序环视之所以麻烦，是因为其机制与正常的匹配机制完全不同：它从当前位置开始，由右向左“倒过来”查找可能的匹配。实际的操作过程更像每次从右向左截取一段文本，再判断它能不能由表达式匹配，不行再尝试……这样的过程可能要重复尝试很多次。如果表达式能匹配的文本长度确定，处理的代价就很小，否则代价可能很大。所以，比较好的做法是 <strong>尽量避免在逆序环视中使用复杂的表达式</strong>。</p> <h3 id="环视的组合"><a href="#环视的组合" class="header-anchor">#</a> 环视的组合</h3> <p>环视匹配的并不是字符，而是位置。在正则表达式匹配时，环视结构匹配成功，并不会更改“当前位置”，所以多个环视可以组合在一起，实现在同一个位置的多重判断。</p> <p>最常见的组合是 <strong>环视中包含环视</strong>（逻辑如图 4-4 所示），比如之前在匹配主机名时，我们限定主机名的长度不能超过 255 个字符，使用表达式 <code>(?=[-a-zA-Z0-9.]{0,255}(?![-a-zA-Z0-9.]))</code>。其中 <code>(?![-a-zA-Z0-9.])</code> 是包含在外层的环视中的，它要求在这个位置（也就是主机名字符串之后）不能再出现属于主机名字符串的字符，也就是保证之前的表达式匹配整个主机名字符串，而不是“可能的主机名字符串的一部分”；综合起来，<code>(?=[-a-zA-Z0-9.]{0,255}(?![-a-zA-Z0-9.]))</code> 保证的是“整个主机名字符串的长度在 255 个字符以内”。</p> <p>[插图]
<strong>图 4-4　环视中包含环视</strong></p> <p>另一种组合是 <strong>并列多个环视</strong>（逻辑如图 4-5 所示），它要求在当前位置，所有环视的判断都必须成功。比如要找到这样的位置：它之后是一个数字字符串，但不能是 999 开头的数字。这时候，就必须并列两个环视。表示数字字符串的表达式是 <code>\d+</code>，对应的环视结构是 <code>(?=\d+)</code>；表示“不是 999 开头”的表达式的环视结构是 <code>(?!999)</code>。现在要做的是把两个环视并列起来，得到 <code>(?=\d+)(?!999)</code>。因为环视结构不会更改当前位置，所以先后顺序无所谓，无论是 <code>(?=\d+)(?!999)</code> 还是 <code>(?!999)(?=\d+)</code>，效果是相同的，都要求同时满足下面两个条件：在当前位置，之后必须出现数字字符串；在当前位置，之后不能出现 999。最终的结果都是对两个环视做“与（and）”运算，也就是说，两个条件必须同时满足才算匹配成功，否则宣告当前位置匹配失败。[6]</p> <p>[插图]
<strong>图 4-5　多个环视并列</strong></p> <p>最后一种组合是将若干个 <strong>环视作为多选分支排列在多选结构中</strong>（逻辑如图 4-6 所示）。比如要找到这样的位置：它之后要么不是数字字符，要么是一个数字字符和一个非数字字符（比如 1a）。“不是数字字符”对应的环视是 <code>(?!\d)</code>；而“一个数字字符和一个非数字字符”对应的环视是 <code>(?=\d\D)</code>，所以总的环视就是 <code>((?!\d)|(?=\d\D))</code>。虽然上一段也提过并列多个环视的组合，但在多选结构中列出多个环视结构的意义大不一样。使用多选结构时，列出的多个环视只要有一个成立，整个判断就成功；不使用多选结构时，所有列出的环视都必须成立，整个判断才成功，具体的例子可见例 4-23。</p> <p><strong>例 4-23　环视作为多选分支</strong>
[插图]
<strong>图 4-6　将环视结构排列在多选分支内</strong></p> <h3 id="断言和反向引用之间的关系"><a href="#断言和反向引用之间的关系" class="header-anchor">#</a> 断言和反向引用之间的关系</h3> <p>断言不匹配任何字符，只匹配位置；而反向引用只引用之前的捕获分组匹配的文本，之前捕获分组中锚点表示的位置信息，在反向引用时并不会保留下来。
举例来说，如果表达式是 <code>(\bcat\b)\s+\1</code>，<code>\1</code> 所匹配的，就不只有单独出现的 cat，还包括单词内部的 cat（比如 cate 中的 cat），如果要验证单词 cat 是否在字符串中出现了两次，正确的做法是在反向引用两端加上单词边界 <code>\b</code>，变成 <code>(\bcat\b).*?\b\1\b</code>，代码见例 4-24。</p> <p><strong>例 4-24　反向引用时不会保留断言的判断</strong>
[插图]</p> <p>有些正则表达式的资料中提到用反向引用匹配重复单词的例子，但是往往只使用 <code>(\b\w+\b)\s+\1</code> 来匹配“重复单词”，这其实是不对的，而应该使用 <code>(\b\w+\b)\s+\b\1\b</code>。反向引用时，之前捕获分组中的断言 <strong>都会被忽略</strong>，这一点请务必注意。</p> <h3 id="逆序环视的诡异之处"><a href="#逆序环视的诡异之处" class="header-anchor">#</a> 逆序环视的诡异之处</h3> <p>环视的概念确实比较难理解，所以值得多说几句。因为环视结构中的正则表达式既要尝试匹配，又不会“推进”当前的匹配位置，（通常）也不会把它匹配的文本包含在整个正则表达式的匹配结果里。但是这还不是最麻烦的，如果你使用逆序环视，还可能遇到更诡异的现象。</p> <p>出现这种现象的主要原因在于，逆序环视是“向左看”的。也就是说，它匹配的是“从当前位置向左数，最右侧的文本”。但是，通常正则表达式匹配的都是“从当前位置向右数，最左侧的文本”，所以在使用逆序环视时，环视结构中的正则表达式开始匹配的位置不同，可能决定了表达式的匹配成功与否。</p> <p>如果表达式是 <code>(?&lt;=ab+)cd</code>，而字符串是 abbcd。匹配结果似乎很容易理解，分两边来看，在右侧，子表达式 <code>cd</code> 匹配字符串 cd；在左侧，字符串 abb 确实可以由子表达式 <code>ab+</code> 匹配，所以整个表达式应该是能够正确匹配的。但是如果我们调整一下字符串中开始匹配的位置，把它向右边推一个字符，会怎么样？仍然分两边来看，在右侧，子表达式 <code>cd</code> 匹配字符串 cd；在左侧，字符串 bb 不能由子表达式 <code>ab+</code> 匹配，所以整个表达式是不能够正确匹配的。</p> <p>那么，到底哪种结果是对的？根据作者余晟的测试，无论在 JavaScript 还是在 .NET 中，<code>(?&lt;=ab+)cd</code> 都可以匹配 abbcd。看起来，正则引擎的处理办法是：遇到环视，要尽可能找到这样的位置—在它的右侧，最左侧的文本能由环视结构中的正则表达式匹配。虽然这么说有点绕，但是理解了它就能理解下面的现象：许多语言中的环视功能要求环视结构中的正则表达式匹配的文本长度必须固定，或者有明确的上限。否则，不是结果难以解释，就是实现成本高昂。</p></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E6%96%AD%E8%A8%80" title="标签">#断言</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2023/07/09, 12:17:47</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/regex/groups/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">分组、捕获和引用</div></a> <a href="/regex/useit/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">实战</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
