ass="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/about/#关于" data-v-06225672>关于</a></li><li data-v-06225672><a href="/about/#关于 - 本站" data-v-06225672>关于 - 本站</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://github.com/alowree" target="_blank" title="作者" class="beLink" data-v-06225672>Alowree</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2023-05-26</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">文章目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">本站 - 自定义样式<span class="title-tag">原创</span></h1> <!----> <div class="theme-vdoing-content content__default"><p>Hexo 的魔改，通常是在 <code>themes\xx主题\layout\xxx.pug</code> 一系列模板里修改增添 HTML 元素节点，在 <code>themes\xx主题\source\css\custom.css</code> 里面修改增添样式代码。</p> <p>VuePress 的魔改，则是在 <code>index.styl</code> 和 <code>palette.styl</code> 这两个文件内进行。但是对这两个文件的修改，仅仅相当于修改 CSS 样式。如果要进一步修改页面结构，那么</p> <ul><li>使用了 npm 主题：需要修改 <code>node_modules\vuepress-theme-vdoing\components\xxx.vue</code> 一系列模板文件</li> <li>使用了本地主题：需要修改 <code>vdoing\components\xxx.vue</code> 一系列模板文件</li></ul> <p></p><div class="table-of-contents"><ul><li><a href="#前言">前言</a></li><li><a href="#引入字体">引入字体</a><ul><li><a href="#缘由">缘由</a></li><li><a href="#引入本地字体">引入本地字体</a></li><li><a href="#引入在线字体">引入在线字体</a></li></ul></li><li><a href="#样式代码">样式代码</a></li><li><a href="#进度条插件">进度条插件</a></li><li><a href="#分栏插件">分栏插件</a></li><li><a href="#调整行高">调整行高</a></li><li><a href="#右侧文章目录">右侧文章目录</a></li><li><a href="#标签图标">标签图标</a></li><li><a href="#参考资料">参考资料</a></li></ul></div><p></p> <p>VuePress 遵循 “约定优于配置” 的原则，推荐的目录结构如下：</p> <p><code>docs/.vuepress</code>: 用于存放全局的配置、组件、静态资源等。<br> <code>docs/.vuepress/components</code>: 该目录中的 Vue 组件将会被自动注册为全局组件。<br> <code>docs/.vuepress/theme</code>: 用于存放本地主题。<br> <code>docs/.vuepress/styles</code>: 用于存放样式相关的文件。<br> <code>docs/.vuepress/styles/index.styl</code>: 将会被自动应用的全局样式文件，会生成在最终的 CSS 文件结尾，具有比默认样式更高的优先级。<br> <code>docs/.vuepress/styles/palette.styl</code>: 用于重写默认颜色常量，或者设置新的 stylus 颜色常量。<br> <code>docs/.vuepress/public</code>: 静态资源目录。<br> <code>docs/.vuepress/templates</code>: 存储 HTML 模板文件。<br> <code>docs/.vuepress/templates/dev.html</code>: 用于开发环境的 HTML 模板文件。<br> <code>docs/.vuepress/templates/ssr.html</code>: 构建时基于 Vue SSR 的 HTML 模板文件。<br> <code>docs/.vuepress/config.js</code>: 配置文件的入口文件，也可以是 YML 或 toml。<br> <code>docs/.vuepress/enhanceApp.js</code>: 客户端应用的增强。</p> <div class="custom-block note"><p class="custom-block-title">笔记</p> <p>如果你喜欢加粗的 <strong>绿色</strong>、`` 包裹的 <code>英文高亮 abcd</code>、&lt;mark&gt;&lt;/mark&gt; 包裹的 <mark>文字高亮</mark>、深色模式的各种颜色（点击右下角的衣服图标，切换深色模式）等等，那么可以参考下面的文章。</p> <div class="custom-block right"><p>2022-5-26 @Alowree</p></div></div> <h2 id="前言"><a href="#前言" class="header-anchor">#</a> 前言</h2> <blockquote><p>本模块已经提取 Vdoing 主题常用的元素选择器，并写好了注释，方便阅读。</p> <p>你如果不满意我的颜色样式，想改成自己喜欢的颜色，直接在提取的元素选择器提供 Color 即可。</p></blockquote> <p>如果你细心观察，你就会发现本站的一些样式和主题自带的样式有所区别。</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/%E5%85%B3%E4%BA%8E/%E5%85%B3%E4%BA%8E%E6%9C%AC%E7%AB%99/20220102230552.png" alt="image-20220102230549810"></p> <p>在浅色主题，也就是默认主题下，我修改了一些内容：</p> <ul><li>代码块背景色</li> <li>代码块行数颜色</li> <li>代码高亮背景色</li> <li>代码高亮颜色</li> <li>加粗颜色</li></ul> <p>......</p> <p>在深色主题下，我修改了一些内容：</p> <ul><li>代码块背景色</li> <li>代码块行数颜色</li> <li>代码高亮背景色</li> <li>代码高亮颜色</li> <li>加粗颜色</li> <li>页面背景色</li> <li>导航栏颜色</li> <li>侧边栏颜色</li> <li>表格背景色</li> <li>表格偶数行颜色</li></ul> <p>......</p> <p>如果你喜欢我的一些样式，可以参考下面的代码。</p> <p>又或者你想定制自己的样式，也可以修改颜色，基本的选择器都已经写好了，只需要更改颜色即可。</p> <h2 id="引入字体"><a href="#引入字体" class="header-anchor">#</a> 引入字体</h2> <h3 id="缘由"><a href="#缘由" class="header-anchor">#</a> 缘由</h3> <p>主题的字体配置虽然并不是保存在 <code>vuepress-theme-vdoing\vdoing\styles\index.styl</code> 内，但可以参考其第 17 行的字体设置内容：</p> <div class="language-STYL line-numbers-mode"><pre class="language-styl"><code><span class="token selector">body</span>
  <span class="token property-declaration"><span class="token property">font-family</span> -apple-system<span class="token punctuation">,</span> BlinkMacSystemFont<span class="token punctuation">,</span> <span class="token string">&quot;Segoe UI&quot;</span><span class="token punctuation">,</span> Roboto<span class="token punctuation">,</span> Oxygen<span class="token punctuation">,</span> Ubuntu<span class="token punctuation">,</span> Cantarell<span class="token punctuation">,</span> <span class="token string">&quot;Fira Sans&quot;</span><span class="token punctuation">,</span> <span class="token string">&quot;Droid Sans&quot;</span><span class="token punctuation">,</span> <span class="token string">&quot;Helvetica Neue&quot;</span><span class="token punctuation">,</span> sans-serif</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>在当前的设置下，有如下事实：</p> <ul><li>当使用的是 Windows 11 时，此时生效的英文字体是 <code>Segoe UI</code></li> <li>在纯文本编辑器 VS Code 里面，英文输入法下输入得到的是垂直引号 <code>'</code> 和 <code>&quot;</code>，中文输入法下输入得到的是英文引号 <code>‘</code>、<code>’</code>、<code>“</code>、<code>”</code></li> <li>Typora 有个 <code>智能标点</code> 功能，启用之后可以直接将英文输入法下的垂直引号自动转换成英式引号，并可以选择 <code>输入时转换</code> 或者 <code>渲染时转换</code></li> <li>在富文本编辑器 Outlook 里面，不论中英文输入法，得到的都是英文引号<code>‘</code>、<code>’</code>、<code>“</code>、<code>”</code></li> <li>英文引号 <code>‘</code>、<code>’</code>、<code>“</code>、<code>”</code> 的外观样式，都受英文字体 <code>Segoe UI</code> 控制，很小且不美观，也不易分辨是垂直引号还是英文引号</li></ul> <p>关于上述的几种引号，以下是引自 Unicode 官方站点的资料：</p> <blockquote><p>0022 &quot; QUOTATION MARK</p> <p>= double quote</p> <p>• neutral (vertical), used as opening or closing quotation mark</p> <p>• preferred characters in English for paired quotation marks are 201C “ &amp; 201D ”</p></blockquote> <blockquote><p>0027 ' APOSTROPHE</p> <p>= apostrophe-quote (1.0)</p> <p>= single quote</p> <p>• neutral (vertical) glyph with mixed usage</p> <p>• 2019 ’ is preferred for apostrophe</p> <p>• preferred characters in English for paired quotation marks are 2018 ‘ &amp; 2019 ’</p></blockquote> <blockquote><p>2018 ‘ LEFT SINGLE QUOTATION MARK</p> <p>= single turned comma quotation mark</p> <p>• this is the preferred character (as opposed to 201B ‛ )</p> <p>→ 0027 ' apostrophe</p></blockquote> <blockquote><p>2019 ’ RIGHT SINGLE QUOTATION MARK</p> <p>= single comma quotation mark</p> <p>• this is the preferred character to use for apostrophe</p> <p>→ 0027 ' apostrophe</p></blockquote> <blockquote><p>201C “ LEFT DOUBLE QUOTATION MARK</p> <p>= double turned comma quotation mark</p> <p>• this is the preferred character (as opposed to 201F ‟ )</p> <p>→ 0022 &quot; quotation mark</p></blockquote> <blockquote><p>201D ” RIGHT DOUBLE QUOTATION MARK</p> <p>= double comma quotation mark</p> <p>→ 0022 &quot; quotation mark</p></blockquote> <p>鉴于四种英文引号在英文字体 <code>Segoe UI</code> 下的欠佳表现，给站点引入 <code>Source Sans Pro</code> 这款英文字体就显得很有必要了。</p> <h3 id="引入本地字体"><a href="#引入本地字体" class="header-anchor">#</a> 引入本地字体</h3> <p>但是直接在 <code>vuepress-theme-vdoing\vdoing\styles\index.styl</code> 这个位置添加 <code>Source Sans Pro</code> 字体，无法生效。这是因为，<code>vuepress-theme-vdoing\vdoing</code> 属于本地主题包，并是当前配置使用的主题包，所以变更这里的字体配置是没用的。</p> <p>在 <code>.vuepress/config.js</code> 中，配置项 <code>theme: 'vdoing'</code> 规定了当前配置使用的是 npm 主题依赖包，其原始 CSS 文件位于 <code>vuepress-theme-vdoing\node-modules\vuepress-theme-vdoing\styles\index.styl</code> 下面。深度玩家可以直接更改这里的字体配置。</p> <blockquote><p>主题的后续维护升级只对 npm 主题包负责，就是说你使用本地主题就等于放弃了后续的升级服务。因此，建议能在 <code>docs\.vuepress\</code> 内配置和修改的，就尽量不要改动主题内部代码。</p></blockquote> <p><code>vuepress-theme-vdoing\docs\.vuepress\styles\index.styl</code>，初级玩家可以在这里添加更改的字体配置。按照个人的理解，这个文件有点类似于 Hexo 里面的 <code>custom.css</code>，这里的规则将会覆盖主题作者原始的 CSS 文件。我们将下面代码添加到 <code>vuepress-theme-vdoing\docs\.vuepress\styles\index.styl</code> 当中：</p> <div class="language-STYL line-numbers-mode"><pre class="language-styl"><code><span class="token selector">body</span>
  <span class="token property-declaration"><span class="token property">font-family</span> -apple-system<span class="token punctuation">,</span> BlinkMacSystemFont<span class="token punctuation">,</span> <span class="token string">'Source Sans Pro'</span><span class="token punctuation">,</span> <span class="token string">&quot;Segoe UI&quot;</span><span class="token punctuation">,</span> Roboto<span class="token punctuation">,</span> Oxygen<span class="token punctuation">,</span> Ubuntu<span class="token punctuation">,</span> Cantarell<span class="token punctuation">,</span> <span class="token string">&quot;Fira Sans&quot;</span><span class="token punctuation">,</span> <span class="token string">&quot;Droid Sans&quot;</span><span class="token punctuation">,</span> <span class="token string">&quot;Helvetica Neue&quot;</span><span class="token punctuation">,</span> sans-serif</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>虽然本地电脑确认已经安装 <code>Source Sans Pro</code> 字体，在 Typora 和 Outlook 内也可正常显示和使用，但是站点如此引入仍然无法生效。怀疑是字体的中文英文名称有冲突，站点无法正常识别本地字体。</p> <p>待解决。</p> <h3 id="引入在线字体"><a href="#引入在线字体" class="header-anchor">#</a> 引入在线字体</h3> <p>尝试在 <code>config.ts</code> 的 <code>head</code> 模块内添加以下代码，以引入谷歌字体：</p> <div class="language-ts line-numbers-mode"><pre class="language-ts"><code>  head<span class="token operator">:</span> <span class="token punctuation">[</span>
    <span class="token punctuation">[</span><span class="token string">'link'</span><span class="token punctuation">,</span> <span class="token punctuation">{</span> rel<span class="token operator">:</span> <span class="token string">'stylesheet'</span><span class="token punctuation">,</span> href<span class="token operator">:</span> <span class="token string">'https://fonts.googleapis.com/css2?family=Source+Sans+Pro&amp;display=swap'</span> <span class="token punctuation">}</span><span class="token punctuation">]</span><span class="token punctuation">,</span> <span class="token comment">// 引入 Google 字体</span>
  <span class="token punctuation">]</span><span class="token punctuation">,</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>成功引入字体 <code>Source Sans Pro</code> 后，以下是相关引号的使用原则：</p> <ul><li>英文单词可使用垂直引号 &quot;&quot; 和 ''，建议更换使用英文引号 “” 或者 ‘’</li> <li>中文词语可使用英文符号 “” 和 ‘’，建议更换使用直角引号「」或者『』</li> <li>其中 &quot;&quot; “” 对应「」，'' ‘’ 对应『』</li></ul> <blockquote><p>山东淄博以“烤炉+小饼+蘸料”的烧烤特色三件套意外出圈，成为了美食界的新晋顶流。“淄博烧烤凭什么这么火”、“淄博烧炭小哥已经被熏黑了”、“淄博的努力是我想不到的”、“沉浸式打卡淄博烧烤”等词条相继登上了平台热榜。 随着淄博烧烤在年轻群体中的关注上涨，粉丝打卡，达人直播，甚至还有政府层面的一系列助推举措有很大关联，铁路方面甚至加开了济南往返淄博的“烧烤专列”，更重要的是淄博烧烤的灵魂在于当地的热情好客的淳朴友好民风。</p></blockquote> <p>When it is enabled, Typora will convert <code>'</code> and <code>&quot;</code> to curly quotes. For example, if you input:</p> <div class="language-markdown line-numbers-mode"><pre class="language-markdown"><code>&quot;It's a 'word' in a quoted sentence.&quot;
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>it will become:</p> <div class="language-markdown line-numbers-mode"><pre class="language-markdown"><code>“It’s a ‘word’ in a quoted sentence.”
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>English “Quotes marks”</p> <blockquote><p>Note: Both <code>Smart Quotes</code> and <code>Smart Dashes</code> are ignored in YAML/code/math block or in source code mode.</p></blockquote> <h2 id="样式代码"><a href="#样式代码" class="header-anchor">#</a> 样式代码</h2> <p>打开 <code>docs\.vuepress\styles\palette.styl</code> 文件，添加如下内容：</p> <div class="language-stylus line-numbers-mode"><pre class="language-stylus"><code><span class="token comment">//***vdoing主题-变量***//</span>

mber">202</span><br><span class="line-number">203</span><br><span class="line-number">204</span><br><span class="line-number">205</span><br><span class="line-number">206</span><br><span class="line-number">207</span><br><span class="line-number">208</span><br><span class="line-number">209</span><br><span class="line-number">210</span><br><span class="line-number">211</span><br><span class="line-number">212</span><br><span class="line-number">213</span><br><span class="line-number">214</span><br><span class="line-number">215</span><br><span class="line-number">216</span><br><span class="line-number">217</span><br><span class="line-number">218</span><br></div></div><h2 id="进度条插件"><a href="#进度条插件" class="header-anchor">#</a> 进度条插件</h2> <p>目前本站使用了 <code>vuepress-plugin-reading-progress</code> 插件，该插件能显示一个页面的进度条（位于顶部的紫色进度条），下面是我用的样式（放在 <code>palette.styl</code> 里）：</p> <div class="language-stylus line-numbers-mode"><pre class="language-stylus"><code><span class="token comment">// 顶部进度条插件</span>

<span class="token variable-declaration"><span class="token variable">$readingZIndex</span> <span class="token operator">=</span> <span class="token number">1000</span></span>

<span class="token variable-declaration"><span class="token variable">$readingProgressColor</span> <span class="token operator">=</span> <span class="token hexcode">#b160ea</span></span>
<span class="token variable-declaration"><span class="token variable">$readingProgressImage</span> <span class="token operator">=</span> none</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>安装这个插件的命令：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">npm</span> <span class="token function">install</span> vuepress-plugin-reading-progress
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>然后在 <code>config.ts</code> 的 <code>plugins</code> 中，添加如下内容：</p> <div class="language-ts line-numbers-mode"><pre class="language-ts"><code>  plugins<span class="token operator">:</span> <span class="token operator">&lt;</span>UserPlugins<span class="token operator">&gt;</span><span class="token punctuation">[</span>
    <span class="token punctuation">[</span>
      <span class="token string">'reading-progress'</span>
    <span class="token punctuation">]</span><span class="token punctuation">,</span>
  <span class="token punctuation">]</span><span class="token punctuation">,</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>启动后就会生效。</p> <h2 id="分栏插件"><a href="#分栏插件" class="header-anchor">#</a> 分栏插件</h2> <p>安装插件：</p> <div class="language-shell line-numbers-mode"><pre class="language-shell"><code><span class="token function">npm</span> <span class="token function">install</span> vuepress-plugin-tabs vue-tabs-component
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>在 <code>.vuepress/styles/index.styl</code> 添加如下内容：</p> <div class="language-styl line-numbers-mode"><pre class="language-styl"><code><span class="token comment">// 引入 `vuepress-plugin-tabs` 插件</span>
<span class="token atrule-declaration"><span class="token atrule">@require</span> <span class="token string">'~vuepress-plugin-tabs/dist/themes/default.styl'</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>在 <code>.vuepress/config.ts</code> 中添加如下内容：</p> <div class="language-ts line-numbers-mode"><pre class="language-ts"><code>plugins<span class="token operator">:</span> <span class="token operator">&lt;</span>UserPlugins<span class="token operator">&gt;</span><span class="token punctuation">[</span>
  plugins<span class="token operator">:</span> <span class="token punctuation">[</span> <span class="token string">'tabs'</span> <span class="token punctuation">]</span><span class="token punctuation">,</span>
<span class="token punctuation">]</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>启动项目，下面是示例代码，每个栏目显示一个列表。</p> <div class="language-markdown line-numbers-mode"><pre class="language-markdown"><code>:::: tabs cache-lifetime=&quot;5&quot; :options=&quot;{ useUrlFragment: false }&quot;

tr> <tr><td><code>\b</code></td> <td>匹配单词的开始或结束</td></tr> <tr><td><code>^</code></td> <td>匹配字符串的开始</td></tr> <tr><td><code>$</code></td> <td>匹配字符串的结束</td></tr></tbody></table></section> <section aria-hidden="true" id="常用限定符" role="tabpanel" class="tabs-component-panel" style="display:none;"><table><thead><tr><th>代码</th> <th>说明</th></tr></thead> <tbody><tr><td><code>*</code></td> <td>重复零次或更多次</td></tr> <tr><td><code>+</code></td> <td>重复一次或更多次</td></tr> <tr><td><code>?</code></td> <td>重复零次或一次</td></tr> <tr><td><code>{n}</code></td> <td>重复 n 次</td></tr> <tr><td><code>{n,}</code></td> <td>重复 n 次或更多次</td></tr> <tr><td><code>{n,m}</code></td> <td>重复 n 到 m 次</td></tr></tbody></table></section> <section aria-hidden="true" id="常用反义词" role="tabpanel" class="tabs-component-panel" style="display:none;"><table><thead><tr><th>代码</th> <th>说明</th></tr></thead> <tbody><tr><td><code>\W</code></td> <td>匹配任意不是字母，数字，下划线，汉字的字符</td></tr> <tr><td><code>\S</code></td> <td>匹配任意不是空白符的字符</td></tr> <tr><td><code>\D</code></td> <td>匹配任意非数字的字符</td></tr> <tr><td><code>\B</code></td> <td>匹配不是单词开头或结束的位置</td></tr> <tr><td><code>[^x]</code></td> <td>匹配除了 x 以外的任意字符</td></tr> <tr><td><code>[^aeiou]</code></td> <td>匹配除了 aeiou 这几个字母以外的任意字符</td></tr></tbody></table></section></div></div> <h2 id="调整行高"><a href="#调整行高" class="header-anchor">#</a> 调整行高</h2> <p>因为上述 <code>palette.styl</code> 的样式代码优化，<code>行内代码</code> 和 <mark>highlight 字体</mark> 的样式，都略高于正常的行高，尤其是在表格内的换行字体，上下行会挤在一起。于是，打开 <code>docs\.vuepress\styles\index.styl</code> 文件，添加如下内容：</p> <div class="language-STYL line-numbers-mode"><div class="highlight-lines"><br><br><div class="highlighted"> </div><br></div><pre class="language-styl"><code><span class="token selector">body</span>
