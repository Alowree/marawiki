</a></li><li><a href="#八-标示语段中某些事物的代号">（八）标示语段中某些事物的代号</a></li><li><a href="#九-标示文稿中的某些方言">（九）标示文稿中的某些方言</a></li><li><a href="#十-引号内的-引号-用单引号">（十）引号内的“引号”用单引号</a></li><li><a href="#十一-标示网友的网名">（十一）标示网友的网名</a></li><li><a href="#十二-其他使用引号的场合">（十二）其他使用引号的场合</a></li></ul></li><li><a href="#三、引用诗歌或书信时的引号处理">三、引用诗歌或书信时的引号处理</a></li><li><a href="#四、引文末尾的点号处理">四、引文末尾的点号处理</a></li></ul></div><p></p> <h2 id="一、引号的误用情形"><a href="#一、引号的误用情形" class="header-anchor">#</a> 一、引号的误用情形</h2> <p>引号的误用主要有以下五种情形。</p> <h3 id="一-对不应加引号的词语误用引号"><a href="#一-对不应加引号的词语误用引号" class="header-anchor">#</a> （一）对不应加引号的词语误用引号</h3> <h3 id="二-对该加引号的词语未加引号"><a href="#二-对该加引号的词语未加引号" class="header-anchor">#</a> （二）对该加引号的词语未加引号</h3> <h3 id="三-间接引用时误用引号"><a href="#三-间接引用时误用引号" class="header-anchor">#</a> （三）间接引用时误用引号</h3> <h3 id="四-引号的范围标引不清"><a href="#四-引号的范围标引不清" class="header-anchor">#</a> （四）引号的范围标引不清</h3> <p>（1）<span class="badge error" style="vertical-align:middle;" data-v-d5affa18>错误</span> 耿大妈对儿子说：“大成，见人该问好就问好，该行礼就行礼，别怕人笑话，俗话说‘礼多人不怪嘛。’”</p> <p>（1）<span class="badge tip" style="vertical-align:middle;" data-v-d5affa18>正确</span> 耿大妈对儿子说：“大成，见人该问好就问好，该行礼就行礼，别怕人笑话，俗话说‘礼多人不怪’嘛。”</p> <p>【简析】例（1）中，俗话应为“礼多人不怪”，“嘛”字是说话人耿大妈的语气词，故应将“嘛”字和句号“。”放在后单引号之后、后双引号之前。后半句改后应为：“……俗话说‘礼多人不怪’嘛。”</p> <p>（2）<span class="badge error" style="vertical-align:middle;" data-v-d5affa18>错误</span> ……办好公司还需要制订一系列规章制度，并严格地遵循和执行，正所谓“没有规矩，不成方圆啊”。</p> <p>（2）<span class="badge tip" style="vertical-align:middle;" data-v-d5affa18>正确</span> ……办好公司还需要制订一系列规章制度，并严格地遵循和执行，正所谓“没有规矩，不成方圆”啊。</p> <p>【简析】同理，例（2）中，说话人的语气词“啊”应放在后引号之后、句号之前。</p> <p>（2）<span class="badge error" style="vertical-align:middle;" data-v-d5affa18>错误</span> 一天，他把周骏羽叫到身边，认真地对他说：“我想了许久，觉得不要再搞文了，还是学工科吧。‘学好数理化，走遍天下都不怕嘛’。”</p> <p>（2）<span class="badge tip" style="vertical-align:middle;" data-v-d5affa18>正确</span> 一天，他把周骏羽叫到身边，认真地对他说：“我想了许久，觉得不要再搞文了，还是学工科吧。‘学好数理化，走遍天下都不怕’嘛。”</p> <p>【简析】例（3）中，语气词“嘛”应放在后单引号与句末句号之间。</p> <h3 id="五-连续多自然段引文的引号误用"><a href="#五-连续多自然段引文的引号误用" class="header-anchor">#</a> （五）连续多自然段引文的引号误用</h3> <h2 id="二、引号的使用场合"><a href="#二、引号的使用场合" class="header-anchor">#</a> 二、引号的使用场合</h2> <p>根据 GB/T15834—2011，结合查阅的资料，归纳并举例说明引号的使用场合。</p> <h3 id="一-标示语段中直接引用的内容"><a href="#一-标示语段中直接引用的内容" class="header-anchor">#</a> （一）标示语段中直接引用的内容</h3> <h3 id="二-标示需要着重论述或强调的内容"><a href="#二-标示需要着重论述或强调的内容" class="header-anchor">#</a> （二）标示需要着重论述或强调的内容</h3> <h3 id="三-标示具有特殊含义而需要特别指出的别称"><a href="#三-标示具有特殊含义而需要特别指出的别称" class="header-anchor">#</a> （三）标示具有特殊含义而需要特别指出的别称</h3> <h3 id="四-标示具有特殊含义而需要特别指出的反语"><a href="#四-标示具有特殊含义而需要特别指出的反语" class="header-anchor">#</a> （四）标示具有特殊含义而需要特别指出的反语</h3> <h3 id="五-标示具有特殊含义而需要特别指出的简称和缩略语"><a href="#五-标示具有特殊含义而需要特别指出的简称和缩略语" class="header-anchor">#</a> （五）标示具有特殊含义而需要特别指出的简称和缩略语</h3> <h3 id="六-标示引用的俗语、成语和歇后语等"><a href="#六-标示引用的俗语、成语和歇后语等" class="header-anchor">#</a> （六）标示引用的俗语、成语和歇后语等</h3> <h3 id="七-标示文稿中的拟声词"><a href="#七-标示文稿中的拟声词" class="header-anchor">#</a> （七）标示文稿中的拟声词</h3> <h3 id="八-标示语段中某些事物的代号"><a href="#八-标示语段中某些事物的代号" class="header-anchor">#</a> （八）标示语段中某些事物的代号</h3> <h3 id="九-标示文稿中的某些方言"><a href="#九-标示文稿中的某些方言" class="header-anchor">#</a> （九）标示文稿中的某些方言</h3> <h3 id="十-引号内的-引号-用单引号"><a href="#十-引号内的-引号-用单引号" class="header-anchor">#</a> （十）引号内的“引号”用单引号</h3> <h3 id="十一-标示网友的网名"><a href="#十一-标示网友的网名" class="header-anchor">#</a> （十一）标示网友的网名</h3> <h3 id="十二-其他使用引号的场合"><a href="#十二-其他使用引号的场合" class="header-anchor">#</a> （十二）其他使用引号的场合</h3> <h2 id="三、引用诗歌或书信时的引号处理"><a href="#三、引用诗歌或书信时的引号处理" class="header-anchor">#</a> 三、引用诗歌或书信时的引号处理</h2> <h2 id="四、引文末尾的点号处理"><a href="#四、引文末尾的点号处理" class="header-anchor">#</a> 四、引文末尾的点号处理</h2></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E5%BC%95%E5%8F%B7" title="标签">#引号</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2023/07/14, 12:24:38</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/punctuation/dunhao/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip"
