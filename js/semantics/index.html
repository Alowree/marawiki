</a></li><li class="sidebar-sub-header level2"><a href="/js/semantics/#_04-认识函数" class="sidebar-link">04. 认识函数</a></li><li class="sidebar-sub-header level2"><a href="/js/semantics/#_05-字符串对象" class="sidebar-link">05. 字符串对象</a></li><li class="sidebar-sub-header level2"><a href="/js/semantics/#_06-数组对象" class="sidebar-link">06. 数组对象</a></li><li class="sidebar-sub-header level2"><a href="/js/semantics/#_07-时间对象" class="sidebar-link">07. 时间对象</a></li><li class="sidebar-sub-header level2"><a href="/js/semantics/#_08-数学对象" class="sidebar-link">08. 数学对象</a></li></ul></li><li><a href="/js/dom-1/" class="sidebar-link">DOM 基础</a></li><li><a href="/js/dom-2/" class="sidebar-link">DOM 进阶</a></li><li><a href="/js/events-1/" class="sidebar-link">事件基础</a></li><li><a href="/js/events-2/" class="sidebar-link">事件进阶</a></li><li><a href="/js/window/" class="sidebar-link">window 对象</a></li><li><a href="/js/document/" class="sidebar-link">document 对象</a></li></ul> </aside> <div><main class="page"><div class="theme-vdoing-wrapper "><div class="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/book/javascript/#《JavaScript 快速上手》" data-v-06225672>《JavaScript 快速上手》</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://github.com/alowree" target="_blank" title="作者" class="beLink" data-v-06225672>Alowree</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2023-06-25</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">文章目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUg ed, multi-paradigm, single-threaded, dynamic language, supporting object-oriented, imperative, and declarative (e.g. functional programming) styles.</p> <p>本文是 《JavaScript 快速上手》的读书笔记，旨在挖坑，打桩，并列出主要骨架。</p> <p></p><div class="table-of-contents"><ul><li><a href="#_01-简介">01. 简介</a><ul><li><a href="#javascript-引入">JavaScript 引入</a></li></ul></li><li><a href="#_02-语法基础">02. 语法基础</a></li><li><a href="#_03-流程控制">03. 流程控制</a></li><li><a href="#_04-认识函数">04. 认识函数</a></li><li><a href="#_05-字符串对象">05. 字符串对象</a></li><li><a href="#_06-数组对象">06. 数组对象</a></li><li><a href="#_07-时间对象">07. 时间对象</a></li><li><a href="#_08-数学对象">08. 数学对象</a></li></ul></div><p></p> <p>为什么要学 JavaScript 呢？两点原因：</p> <ol><li>客户端 <a href="https://developer.mozilla.org/zh-CN/docs/Learn/Forms/Form_validation" target="_blank" rel="noopener noreferrer">表单数据校验<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，减轻服务器端的压力</li> <li>制作页面动态特效</li></ol> <h2 id="_01-简介"><a href="#_01-简介" class="header-anchor">#</a> 01. 简介</h2> <ul><li>嵌入到 HTML 页面中的编程语言，由浏览器一边解释一边执行</li> <li>HTML 用于控制网页的结构，CSS 用于控制网页的外观，而 JavaScript 控制着网页的行为</li> <li>不是“会动”的页面就叫动态页面，静态页面和动态页面的区别在于是否与服务器进行数据交互</li> <li>学习路径：JavaScript 入门、jQuery、JavaScript 进阶</li></ul> <h3 id="javascript-引入"><a href="#javascript-引入" class="header-anchor">#</a> JavaScript 引入</h3> <p>想要在 HTML 中引入 JavaScript，一般有 3 种方式：</p> <ul><li>外部 JavaScript</li> <li>内部 JavaScript</li> <li>元素事件 JavaScript</li></ul> <details class="custom-block details"><summary>那么，推荐使用哪一种引入方式呢？</summary> <p>外部 JavaScript 是最理想的 JavaScript 引入方式。在实际开发中，为了提升网站的性能和可维护性，一般都会使用外部 JavaScript。</p></details> <ol><li>在 HTML 中，我们可以使用“script 标签”引入外部 JavaScript 文件。在 script 标签中，我们只需用到 src 这一个属性</li></ol> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token doctype"><span class="token punctuation">&lt;!</span><span class="token doctype-tag">DOCTYPE</span> <span class="token name">html</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>html</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>head</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>meta</span> <span class="token attr-name">charset</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>utf-8<span class="token punctuation">&quot;</span></span> <span class="token punctuation">/&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>title</span><span class="token punctuation">&gt;</span></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>title</span><span class="token punctuation">&gt;</span></span>
    <span class="token comment">&lt;!--1.在 head 中引入--&gt;</span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span> <span class="token attr-name">src</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>index.js<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span><span class="token script"></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>script</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>head</span><span class="token punctuation">&gt;</span></span>

  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>body</span><span class="token punctuation">&gt;</span></span>
    <span class="token comment">&lt;!--2.在 body 中引入--&gt;</span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span> <span class="token attr-name">src</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>index.js<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span><span class="token script"></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>script</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>body</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>html</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><p>外部 JavaScript，与 CSS 不同的是，JavaScript 既可以在 head 中引入，又可以在 body 中引入。</p> <details class="custom-block details"><summary>那么，推荐在 head 还是 body 中引入呢？</summary> <p>据观察，JavaScript 外部文件一般在 head 引入的比较普遍。</p></details> <ol start="2"><li>内部 JavaScript，放在 <code>&lt;script&gt;&lt;/script&gt;</code> 标签中间的 JavaScript 代码</li></ol> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token doctype"><span class="token punctuation">&lt;!</span><span class="token doctype-tag">DOCTYPE</span> <span class="token name">html</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>html</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>head</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>meta</span> <span class="token attr-name">charset</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>utf-8<span class="token punctuation">&quot;</span></span> <span class="token punctuation">/&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>title</span><span class="token punctuation">&gt;</span></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>title</span><span class="token punctuation">&gt;</span></span>
    <span class="token comment">&lt;!--1.在 head 中引入--&gt;</span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span><span class="token punctuation">&gt;</span></span><span class="token script"><span class="token language-javascript">
      ……
    </span></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>script</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>head</span><span class="token punctuation">&gt;</span></span>

  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>body</span><span class="token punctuation">&gt;</span></span>
    <span class="token comment">&lt;!--2.在 body 中引入--&gt;</span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span><span class="token punctuation">&gt;</span></span><span class="token script"><span class="token language-javascript">
      ……

<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>html</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br></div></div><p>本书中的大部分实例演示，使用的都是内部 JavaScript，在 head 引入。</p> <ol start="3"><li>元素属性 JavaScript，在元素的事件属性中直接编写 JavaScript 或调用函数</li></ol> <h2 id="_02-语法基础"><a href="#_02-语法基础" class="header-anchor">#</a> 02. 语法基础</h2> <ul><li><p>变量与常量</p> <ul><li>标识符，<code>[a-zA-Z0-9_$]</code>，数字不开头，大小写敏感</li> <li><code>var 变量名 = 值；</code></li> <li><code>var 大写常量名 = 值；</code></li></ul></li> <li><p>数据类型</p> <ul><li>5 种基本数据类型：数字，字符串，布尔值，未定义值，空值
<ul><li>数字：不分“整型”和“浮点型”</li> <li>字符串：用单引号 <code>'</code> 或 双引号 <code>&quot;</code> 括起来</li> <li>布尔值：<code>true</code> 和 <code>false</code></li> <li>未定义值：虽然使用 <code>var n;</code> 声明了，但是没赋值，此时该变量的值就是“未定义值”，<code>undefined</code></li> <li>空值：<code>var n = null;</code>，则表示系统没有给这个变量 n 分配内存空间</li></ul></li> <li>1 种引用数据类型：对象（数组也是属于对象的一种）</li></ul></li> <li><p>运算符</p> <ul><li>算术运算符
<ul><li>加法运算符：<code>num+num = num</code>，<code>str+str = str</code>，<code>num+str = str</code></li> <li>自增运算符</li> <li>自减运算符</li></ul></li> <li>赋值运算符</li> <li>比较运算符</li> <li>逻辑运算符</li> <li>条件运算符</li></ul></li> <li><p>类型转换：隐式类型转换和显式类型转换</p> <ul><li>“字符串”转为“数字”：
<ul><li><code>Number()</code> 将任何“数字型字符串”转换成数字</li> <li><code>parseInt()</code> 和 <code>parseFloat()</code> 可以提取“首字母为数字的任意字符串”</li></ul></li> <li>“数字”转为“字符串”
<ul><li>数字与空串相加 <code>var a = 2018+&quot;&quot;</code></li> <li><code>toString()</code></li></ul></li></ul></li> <li><p>转义字符</p> <ul><li><code>\'</code></li> <li><code>\&quot;</code></li> <li><code>\n</code></li></ul></li></ul> <blockquote><p>对于字符串的换行，有以下两种情况：</p> <ul><li>如果是在 <code>document.write()</code> 中换行，则应该用 <code>&lt;br/&gt;</code></li> <li>如果是在 <code>alert()</code> 中换行，则应该用 <code>\n</code></li></ul></blockquote> <ul><li>注释
<ul><li>单行注释 <code>// 单行注释内容</code></li> <li>多选注释 <code>/* 多行注释内容块 */</code></li></ul></li></ul> <h2 id="_03-流程控制"><a href="#_03-流程控制" class="header-anchor">#</a> 03. 流程控制</h2> <p>待补充</p> <h2 id="_04-认识函数"><a href="#_04-认识函数" class="header-anchor">#</a> 04. 认识函数</h2> <ul><li>定义函数的关键字，<code>function name(a, b) {}</code></li> <li>JavaScript 的函数调用和 Java 有区别，4 种调用方式
<ul><li>直接调用</li> <li>在表达式中调用，返回值参与表达式运算</li> <li>在超链接中调用，a 元素的 <code>&lt;a href=&quot;javascript: 函数名&quot;&gt;点击这里&lt;/a&gt;</code>，点击就调用</li> <li>在事件中调用，比如单击按钮，写在按钮的事件属性里 <code>&lt;input type=&quot;button&quot; onclick=&quot;alertMes()&quot; value=&quot;提交&quot; /&gt;</code></li></ul></li> <li>内置函数和自定义函数</li></ul> <h2 id="_05-字符串对象"><a href="#_05-字符串对象" class="header-anchor">#</a> 05. 字符串对象</h2> <ul><li>内置对象：字符串对象 String，数组对象 Array，日期对象 Date，数值对象 Math</li> <li><code>str.length</code></li> <li><code>str.toLowerCase()</code>，<code>toUpperCase()</code></li> <li><code>str.charAt(n)</code></li> <li><code>str.substring(start, end)</code>：切片</li> <li><code>str.replace(&quot;js&quot;, &quot;JavaScript&quot;)</code></li> <li><code>str.replace(/loser/g, &quot;hero&quot;)</code>：通过正则表达式查找和替换</li> <li><code>str.split(&quot;分隔符&quot;)</code>：返回一个数组</li> <li><code>str.indexOf(&quot;指定子串&quot;)</code>，<code>str.lastIndexOf(&quot;指定子串&quot;)</code>：不存在则返回 <code>-1</code></li></ul> <h2 id="_06-数组对象"><a href="#_06-数组对象" class="header-anchor">#</a> 06. 数组对象</h2> <ul><li><code>var arr = new Array(a1, a2, ..., an);</code></li> <li><code>var arr = [a1, a2, ..., an];</code> 语法糖</li> <li><code>arr.length</code></li> <li><code>arr.slice(start, end)</code>：切片</li> <li><code>arr.unshift(a1, a2)</code>，<code>arr.push(a3, a4)</code>：在开头和结尾添加新元素</li> <li><code>arr.shift()</code>，<code>arr.pop()</code>：在开头和结尾删一个</li> <li><code>arr.sort(up)</code>，<code>arr.sort(down)</code>：此处关于升序函数和降序函数不是特别明白，需要后续学习</li> <li><code>arr.reverse()</code>：数组反向</li> <li><code>arr.join(&quot;连接符&quot;)</code>：把数组内的各项元素拼接成一条字符串</li></ul> <h2 id="_07-时间对象"><a href="#_07-时间对象" class="header-anchor">#</a> 07. 时间对象</h2> <ul><li><code>var oDate = new Date();</code></li> <li>方法：<code>getXXX()</code>，<code>setXXX()</code></li></ul> <h2 id="_08-数学对象"><a href="#_08-数学对象" class="header-anchor">#</a> 08. 数学对象</h2> <p>Math 对象跟其他对象不一样，Math 对象不需要使用 <code>new</code> 关键字来创造，而可以直接使用它的属性和方法。</p> <ul><li><code>Math.PI</code>，角度 <code>120*Math.PI/180</code>，<code>150*Math.PI/180</code></li> <li><code>Math.max()</code>，<code>Math.min()</code>，<code>Math.floor()</code>，<code>Math.ceil()</code></li> <li><code>Math.random()</code>，生成 <code>[0,1)</code></li></ul></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E5%88%9D%E7%BA%A7" title="标签">#初级</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2023/07/12, 08:13:30</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><!----> <a href="/js/dom-1/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">DOM 基础</div></a></div> <div class="page-nav"><p class="inner"><!----> <span class="next"><a href="/js/dom-1/">DOM 基础</a>→
