bar-sub-header level2"><a href="/js/dom-1/#插入元素" class="sidebar-link">插入元素</a></li><li class="sidebar-sub-header level2"><a href="/js/dom-1/#删除元素" class="sidebar-link">删除元素</a></li><li class="sidebar-sub-header level2"><a href="/js/dom-1/#复制元素" class="sidebar-link">复制元素</a></li><li class="sidebar-sub-header level2"><a href="/js/dom-1/#替换元素" class="sidebar-link">替换元素</a></li></ul></li><li><a href="/js/dom-2/" class="sidebar-link">DOM 进阶</a></li><li><a href="/js/events-1/" class="sidebar-link">事件基础</a></li><li><a href="/js/events-2/" class="sidebar-link">事件进阶</a></li><li><a href="/js/window/" class="sidebar-link">window 对象</a></li><li><a href="/js/document/" class="sidebar-link">document 对象</a></li></ul> </aside> <div><main class="page"><div class="theme-vdoing-wrapper "><div class="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/book/javascript/#《JavaScript 快速上手》" data-v-06225672>《JavaScript 快速上手》</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://github.com/alowree" target="_blank" title="作者" class="beLink" data-v-06225672>Alowree</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2023-06-25</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">文章目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABKFJREFUSA3tVl1oFVcQnrMbrak3QUgkya1akpJYcrUtIqW1JvFBE9LiQ5v6JmJpolbMg32rVrhgoYK0QiMY6i9Y6EMaW5D+xFJaTYItIuK2Kr3+BJNwkxBj05sQY3b3nM6cs2dv9t7NT/vQJw/sndk5M/PNzJkzewGerP+pAmy+ON8lLzUJgA8ZYxYIYZmGYRnctDaWvJJAmTtfP1pvXsBCCPP8QFcCaRkZYACgDZFO4stNIcBCajEOlmmC9XpJ9bAGCaPaPmzPl32dvLSVu3BWCTQs0XQQ6g0DYgwLIoAZbBCdW/i+781o1VVlm/410mw4h06Y7bIPHNyWDyL4FHkX03Q8SrzNhZTZriieckWt7cL6MM85YcLpsi/7O9/iXFT6MswI0DmmpkSaJ0qLxFIm3+i1THHB3zmBH3PYx9CcykcLOeQVVa7QtdxTgQgEleX2AjHYfwA+2ddV77ruGoJUbhGDI09YSNXyMpUt5ylOzxgbUmtOp7NmbNt8v3arjTBfYELmLUV+M+nSawNNAUqpT3ClJWg5I3BLT+cGW/DXNGCa6tx1aakCGEigArTn4TDIPdrXXYKCZNrHLMCOEPvHBlLQ99s9eHB7EB6NTki73CVPQ2F5MSx/uRQixfmq7rK0wYD8w8E905bnPDfwoWs/rfv93NWN/ZfvwsLIU7A09gxECyISeGJkHAau98L97tuw7NXnoPyNF8FcYGLGKsOs0mN3OEyec9esGW/ZEl945dTP34wlR2FZVQWU1q0Cw8Tr7p+hgLLNL0FPxx/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">DOM 基础<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>The Document Object Model (DOM) connects web pages to scripts or programming languages by representing the structure of a document—such as the HTML representing a web page—in memory. Usually it refers to JavaScript, even though modeling HTML, SVG, or XML documents as objects are not part of the core JavaScript language.</p> <p>The DOM represents a document with a logical tree. Each branch of the tree ends in a node, and each node contains objects. DOM methods allow programmatic access to the tree. With them, you can change the document's structure, style, or content.</p> <p>Nodes can also have event handlers attached to them. Once an event is triggered, the event handlers get executed.</p> <p></p><div class="table-of-contents"><ul><li><a href="#什么是-dom">什么是 DOM</a></li><li><a href="#节点类型">节点类型</a></li><li><a href="#获取元素">获取元素</a></li><li><a href="#创建元素">创建元素</a></li><li><a href="#插入元素">插入元素</a></li><li><a href="#删除元素">删除元素</a></li><li><a href="#复制元素">复制元素</a></li><li><a href="#替换元素">替换元素</a></li></ul></div><p></p> <h2 id="什么是-dom"><a href="#什么是-dom" class="header-anchor">#</a> 什么是 DOM</h2> <ul><li>DOM，全称是“Document Object Model（文档对象模型）”，它是由 W3C 定义的一个标准</li> <li>DOM 操作，可以简单地理解成“元素操作”</li> <li>DOM 采用的是“树型结构”，用“树节点”的形式来表面页面中的一个元素</li> <li>我们在操作元素时，其实就是把这个元素看成一个对象，然后使用这个对象的属性和方法来进行相关操作</li></ul> <h2 id="节点类型"><a href="#节点类型" class="header-anchor">#</a> 节点类型</h2> <p>DOM 节点共有 12 种类型，只需掌握三种：</p> <ol><li>元素节点</li> <li>属性节点</li> <li>文本节点</li></ol> <p>JavaScript 会把元素、属性以及文本当作不同的节点来处理。表示元素的叫作“元素节点”，表示属性的叫作“属性节点”，表示文本的叫作“文本节点”。很多人认为节点就等于元素，这样的理解是错的，因为节点有好多种。总而言之，节点和元素是不一样的概念，节点是包括元素的（即节点是比元素高了一个层级的概念）。</p> <p>在 JavaScript 中，我们可以使用 nodeType 属性来判断一个节点的类型。不同节点的 nodeType 属性值如表 9-1 所示。</p> <div class="center-container"><p>表 9-1 不同节点的 nodeType 属性值</p></div><table><thead><tr><th>节点类型</th> <th>nodeType 值</th></tr></thead> <tbody><tr><td>元素节点</td> <td>1</td></tr> <tr><td>属性节点</td> <td>2</td></tr> <tr><td>文本节点</td> <td>3</td></tr></tbody></table> <p>nodeType 的值是一个数字，而不是像“element”或“attribute”那样的英文字符串。</p> <p>此外，对于节点类型，需要特别注意以下 3 点：</p> <ul><li>一个元素就是一个节点，这个节点称为“元素节点”</li> <li>属性节点和文本节点看起来像是元素节点的一部分，但实际上，它们是独立的节点，并不属于元素节点</li> <li>只有元素节点才可以拥有子节点，属性节点和文本节点都无法拥有子节点</li></ul> <h2 id="获取元素"><a href="#获取元素" class="header-anchor">#</a> 获取元素</h2> <p>获取元素 6 种方式：</p> <ol><li><code>getElementById()</code> 获取的是一个 DOM 对象，我们在给变量命名的时候，习惯性地以英文“o”开头，以便跟其他变量区分开，这可以让我们一眼就看出这是一个 DOM 对象</li> <li><code>getElementsByTagName()</code>，获取的是多个元素（即集合），注意有 s，返回一个“类数组”（也叫伪数组），只能用下标和 <code>length</code>，数组的其他方法不能用</li> <li><code>getElementsByClassName()</code>，也有 s，获取的也是一个“类数组”</li> <li><code>querySelector(&quot;选择器&quot;)</code>，表示选取满足选择条件的第 1 个元素；<code>querySelectorAll()</code> 表示选取满足条件的所有元素，获取的是多个元素，因此这也是一个“类数组”</li> <li><code>getElementsByName()</code>，只用于表单元素，一般只用于单选按钮和复选框</li> <li><code>document.title</code> 和 <code>document.body</code></li></ol> <p>实际上，<code>getElementById()</code> 和 <code>getElementsByTagName()</code> 有以下 3 个明显的区别（很重要，认真理解）：</p> <ul><li><code>getElementById()</code> 获取的是 1 个元素，而 <code>getElementsByTagName()</code> 获取的是多个元素（伪数组）</li> <li><code>getElementById()</code> 前面只可以接 <code>document</code>，也就是 <code>document.getElementById()</code>；<code>getElementsByTagName()</code> 前面不仅可以接 <code>document</code>，还可以接其他 DOM 对象</li> <li><code>getElementById()</code> 不可以操作动态创建的 DOM 元素，而 <code>getElementsByTagName()</code> 可以操作动态创建的 DOM 元素</li></ul> <h2 id="创建元素"><a href="#创建元素" class="header-anchor">#</a> 创建元素</h2> <p>在 JavaScript 中，我们可以使用 <code>createElement()</code> 来创建一个元素节点，也可以使用 <code>createTextNode()</code> 来创建一个文本节点，然后可以将元素节点与文本节点“组装”成我们平常看到的“有文本内容的元素”。</p> <p>这种方式又被称为“动态 DOM 操作”。所谓的“动态 DOM”，指的是使用 JavaScript 创建的元素。这个元素一开始在 HTML 中是不存在的。</p> <p>语法</p> <div class="language-js line-numbers-mode"><pre class="language-js"><code><span class="token keyword">var</span> e1 <span class="token operator">=</span> document<span class="token punctuation">.</span><span class="token function">createElement</span><span class="token punctuation">(</span><span class="token string">&quot;元素名&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 创建元素节点</span>
<span class="token keyword">var</span> txt <span class="token operator">=</span> document<span class="token punctuation">.</span><span class="token function">createTextNode</span><span class="token punctuation">(</span><span class="token string">&quot;文本内容&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 创建文本节点</span>
e1<span class="token punctuation">.</span><span class="token function">appendChild</span><span class="token punctuation">(</span>txt<span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 把文本节点插入元素节点中</span>
e2<span class="token punctuation">.</span><span class="token function">appendChild</span><span class="token punctuation">(</span>e1<span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 把组装好的元素 e1 插入已存在的元素 e2 中</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><ol><li>创建简单元素（不带属性）</li></ol> <div class="language-html line-numbers-mode"><pre class="language-html"><code><span class="token doctype"><span class="token punctuation">&lt;!</span><span class="token doctype-tag">DOCTYPE</span> <span class="token name">html</span><span class="token punctuation">&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>html</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>head</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>meta</span> <span class="token attr-name">charset</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>utf-8<span class="token punctuation">&quot;</span></span> <span class="token punctuation">/&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>title</span><span class="token punctuation">&gt;</span></span><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>title</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>script</span><span class="token punctuation">&gt;</span></span><span class="token script"><span class="token language-javascript">
